<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Underground</title>
<link rel="icon" type="image/jpeg" href="image1.jpeg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
/* ── Variables ────────────────────────────────────────────────────────────── */
:root {
  --primary:       #7c4dff;
  --primary-light: #b388ff;
  --primary-dim:   rgba(124,77,255,0.15);
  --bg-dark:       #0d0b14;
  --bg-light:      #13101c;
  --bg-lighter:    #1c1728;
  --border:        #2a2438;
  --text:          #e8e6f0;
  --muted:         #7a7590;
  --success:       #00e5a0;
  --neon:          0 0 8px rgba(124,77,255,0.6), 0 0 20px rgba(124,77,255,0.2);
}

/* ── Reset ────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  line-height: 1.5;
  font-size: 15px;
  min-height: 100vh;
}
button, input, textarea { font-family: inherit; }
a { color: inherit; }

/* ── App layout ───────────────────────────────────────────────────────────── */
#app {
  display: flex;
  max-width: 1280px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ── Left sidebar ─────────────────────────────────────────────────────────── */
#sidebar-left {
  width: 240px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-light);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  overflow-y: auto;
}

.logo-wrap { text-align: center; margin-bottom: 20px; }
.logo-wrap img {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  object-fit: cover;
}
.logo-wrap .site-name {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary-light);
  margin-top: 6px;
  font-weight: 600;
}

nav { flex: 1; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 11px 14px;
  background: transparent;
  border: none;
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: background 0.18s, color 0.18s, box-shadow 0.18s;
  margin-bottom: 2px;
}
.nav-btn:hover { background: var(--bg-lighter); color: var(--primary-light); }
.nav-btn.active { background: var(--primary-dim); color: var(--primary-light); box-shadow: var(--neon); }
.nav-icon { font-size: 19px; width: 22px; text-align: center; }

#sidebar-bottom { margin-top: auto; padding-top: 16px; }
.wallet-display {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  word-break: break-all;
  padding: 6px 4px;
  background: var(--bg-darker, var(--bg-dark));
  border-radius: 8px;
  margin-bottom: 8px;
  display: none;
}
#connect-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border: none;
  border-radius: 24px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
#connect-btn:hover { box-shadow: var(--neon); }
#connect-btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  padding: 8px;
}

/* ── Main ─────────────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  min-width: 0;
  background: var(--bg-light);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

/* Sticky feed header */
#feed-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(19,16,28,0.90);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#feed-title { font-size: 17px; font-weight: 700; color: var(--primary-light); }
#refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
#refresh-btn:hover { border-color: var(--primary); color: var(--primary-light); }

/* New posts banner */
#new-posts-btn {
  display: none;
  width: 100%;
  padding: 10px;
  background: var(--primary);
  border: none;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  letter-spacing: 0.3px;
}
#new-posts-btn:hover { background: var(--primary-light); }

/* Compose box */
#compose-area {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.compose-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.compose-body { flex: 1; min-width: 0; }
#compose-input {
  width: 100%;
  min-height: 76px;
  padding: 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  resize: none;
  transition: border-color 0.2s;
}
#compose-input:focus { outline: none; border-color: var(--primary); }
#compose-input::placeholder { color: var(--muted); }
.compose-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.char-count { font-size: 12px; color: var(--muted); }
#post-btn {
  padding: 8px 22px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none;
  border-radius: 20px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: box-shadow 0.2s, opacity 0.2s;
}
#post-btn:hover { box-shadow: var(--neon); }
#post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Feed items */
#feed { flex: 1; }
.post-item {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.post-item:hover { background: var(--bg-lighter); }
.post-header { display: flex; gap: 10px; margin-bottom: 8px; }
.post-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--bg-dark);
}
.post-meta { min-width: 0; }
.post-name { font-weight: 700; font-size: 14px; }
.post-handle { color: var(--muted); font-size: 13px; margin-left: 4px; }
.post-time { color: var(--muted); font-size: 12px; }
.reply-badge {
  display: inline-block;
  font-size: 12px;
  color: var(--primary-light);
  margin-bottom: 6px;
}
.post-body {
  font-size: 15px;
  line-height: 1.65;
  word-break: break-word;
  color: var(--text);
  margin-bottom: 10px;
}
.read-more-btn {
  background: none;
  border: none;
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  margin-bottom: 10px;
  display: block;
}
.read-more-btn:hover { color: #fff; }
.post-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.act-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 20px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.act-btn:hover { border-color: var(--primary); color: var(--primary-light); }
.otter-link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  padding: 5px 8px;
  border-radius: 20px;
  transition: color 0.18s;
}
.otter-link:hover { color: var(--primary-light); }

/* Loading / empty states */
#loading-more {
  display: none;
  padding: 24px;
  text-align: center;
  color: var(--primary-light);
  font-size: 13px;
}
.empty-state {
  padding: 64px 24px;
  text-align: center;
  color: var(--muted);
}
.empty-icon { font-size: 44px; margin-bottom: 16px; display: block; }
.empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 14px; }

/* ── Right sidebar ────────────────────────────────────────────────────────── */
#sidebar-right {
  width: 270px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  background: var(--bg-light);
  border-left: 1px solid var(--border);
  padding: 20px 14px;
  overflow-y: auto;
}
.sb-section { margin-bottom: 24px; }
.sb-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--primary); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--muted);
  pointer-events: none;
}
.ch-btn {
  display: block;
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s;
  margin-bottom: 6px;
}
.ch-btn:hover { border-color: var(--primary); color: var(--primary-light); }
.ch-btn.active { border-color: var(--primary); color: var(--primary-light); background: var(--primary-dim); }
.custom-row { display: flex; gap: 6px; margin-top: 4px; }
.custom-row input {
  flex: 1;
  padding: 8px 10px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  min-width: 0;
}
.custom-row input:focus { border-color: var(--primary); }
.custom-row input::placeholder { color: var(--muted); }
.go-btn {
  padding: 8px 12px;
  background: var(--primary);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: box-shadow 0.2s;
  flex-shrink: 0;
}
.go-btn:hover { box-shadow: var(--neon); }
.ch-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  word-break: break-all;
  line-height: 1.5;
}

/* ── Mobile bottom nav ────────────────────────────────────────────────────── */
#mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-light);
  border-top: 1px solid var(--border);
  z-index: 100;
  justify-content: space-around;
  padding: 6px 0 10px;
}
.mn-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  cursor: pointer;
  padding: 6px 14px;
  transition: color 0.18s;
  border-radius: 8px;
}
.mn-btn .mn-icon { font-size: 20px; line-height: 1; }
.mn-btn.active, .mn-btn:hover { color: var(--primary-light); }

/* ── Modals ───────────────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(10, 8, 18, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 500;
  padding: 16px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
  position: relative;
}
.modal.wide { max-width: 600px; }
.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all 0.18s;
}
.modal-close:hover { background: var(--bg-lighter); color: var(--text); }

/* Profile modal */
.profile-avatar-section {
  text-align: center;
  margin-bottom: 20px;
}
.profile-avatar-section img {
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  object-fit: cover;
  display: block;
  margin: 0 auto 12px;
}
.profile-avatar-section h2 { font-size: 20px; margin-bottom: 4px; }
.profile-avatar-section p { font-size: 13px; color: var(--muted); }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--primary); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
.form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }

.btn-row { display: flex; gap: 8px; margin-top: 18px; }
.btn-primary {
  flex: 1;
  padding: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.btn-primary:hover { box-shadow: var(--neon); }
.btn-ghost {
  padding: 11px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--primary); color: var(--text); }

/* Reply context quote */
.reply-quote {
  padding: 10px 14px;
  background: var(--bg-lighter);
  border-left: 3px solid var(--primary);
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
  line-height: 1.5;
}

/* Thread replies */
.thread-reply {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

/* ── Toast ────────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-lighter);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 9px 20px;
  font-size: 13px;
  display: none;
  z-index: 2000;
  box-shadow: var(--neon);
  white-space: nowrap;
  max-width: 90vw;
}

/* ── Loading overlay ──────────────────────────────────────────────────────── */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,11,20,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  color: var(--primary-light);
  font-size: 15px;
  flex-direction: column;
  gap: 12px;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 1050px) {
  #sidebar-right { width: 220px; }
}

@media (max-width: 768px) {
  #sidebar-left, #sidebar-right { display: none; }
  #mobile-nav { display: flex; }
  #main { padding-bottom: 64px; }
  #app { max-width: 100%; }
  #compose-area, .post-item, #feed-header { padding-left: 14px; padding-right: 14px; }
  .modal { padding: 16px; }
  #toast { bottom: 80px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Left Sidebar ────────────────────────────────────────────────────── -->
  <div id="sidebar-left">
    <div class="logo-wrap">
      <img src="image1.jpeg" alt="Pulse Underground">
      <span class="site-name">Pulse Underground</span>
    </div>

    <nav>
      <button class="nav-btn active" id="nav-home">
        <span class="nav-icon">🏠</span> Home
      </button>
      <button class="nav-btn" id="nav-messages">
        <span class="nav-icon">✉️</span> Messages
      </button>
      <button class="nav-btn" id="nav-notifications">
        <span class="nav-icon">🔔</span> Notifications
      </button>
      <button class="nav-btn" id="nav-profile">
        <span class="nav-icon">👤</span> Profile
      </button>
    </nav>

    <div id="sidebar-bottom">
      <div id="wallet-display" class="wallet-display"></div>
      <button id="connect-btn">Connect Wallet</button>
    </div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <div id="main">
    <button id="new-posts-btn">✦ New posts — click to load</button>

    <div id="feed-header">
      <span id="feed-title">The Pulse Underground</span>
      <button id="refresh-btn">↺ Refresh</button>
    </div>

    <div id="compose-area">
      <img src="image1.jpeg" class="compose-avatar" id="compose-avatar" alt="">
      <div class="compose-body">
        <textarea id="compose-input" placeholder="What's happening on Pulse?"></textarea>
        <div class="compose-footer">
          <span class="char-count" id="char-count">0</span>
          <button id="post-btn">Post ➤</button>
        </div>
      </div>
    </div>

    <div id="feed"></div>
    <div id="loading-more">Scanning the chain for more posts…</div>
  </div>

  <!-- ── Right Sidebar ──────────────────────────────────────────────────── -->
  <div id="sidebar-right">
    <div class="sb-section">
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input type="text" id="search-input" placeholder="Search posts…">
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-title">Channels</div>
      <button class="ch-btn active" id="ch-main">🌐 Main Channel</button>
      <div class="custom-row">
        <input type="text" id="custom-input" placeholder="0x address…">
        <button class="go-btn" id="ch-go">Go</button>
      </div>
      <div class="ch-label" id="ch-label"></div>
    </div>
  </div>

</div><!-- #app -->

<!-- ── Mobile nav ─────────────────────────────────────────────────────────── -->
<nav id="mobile-nav">
  <button class="mn-btn active" data-mn="home">
    <span class="mn-icon">🏠</span>Home
  </button>
  <button class="mn-btn" data-mn="messages">
    <span class="mn-icon">✉️</span>Messages
  </button>
  <button class="mn-btn" data-mn="profile">
    <span class="mn-icon">👤</span>Profile
  </button>
  <button class="mn-btn" data-mn="wallet">
    <span class="mn-icon">🔗</span>Wallet
  </button>
</nav>

<!-- ── Loading overlay ────────────────────────────────────────────────────── -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span id="loading-label">Publishing…</span>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Profile Modal ──────────────────────────────────────────────────────── -->
<div class="modal-bg" id="profile-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="profile-modal-title">Profile</span>
      <button class="modal-close" id="close-profile">✕</button>
    </div>
    <!-- View mode -->
    <div id="profile-view">
      <div class="profile-avatar-section">
        <img src="image1.jpeg" id="pv-avatar" alt="Profile">
        <h2 id="pv-name">Anonymous</h2>
        <p id="pv-bio">No bio yet.</p>
      </div>
      <button class="btn-primary" style="width:100%" id="edit-profile-btn">✏️ Edit Profile</button>
    </div>
    <!-- Edit mode -->
    <div id="profile-edit" style="display:none">
      <div style="text-align:center;margin-bottom:16px">
        <img src="image1.jpeg" id="pe-preview"
          style="width:80px;height:80px;border-radius:50%;border:2px solid var(--primary);object-fit:cover">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-input" id="pe-name" placeholder="Your display name">

<!-- ═══════════════════════════════════════════════════════════════════════════
     JavaScript
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
const ethers = window.ethers;

/* ── Constants ──────────────────────────────────────────────────────────── */
const MAIN_CHANNEL   = '0x9cd83be15a79646a3d22b81fc8ddf7b7240a62cb';
const PULSE_CHAIN_ID = 369;
const REPLY_PREFIX   = 'REPLY_TO:';
const PROFILE_PREFIX = 'PROFILE_DATA:';
const MAX_PREVIEW    = 500;
const POSTS_TARGET   = 20;  // target posts per load call
const MAX_PAGES      = 40;  // safety cap: scan at most 2000 txs per call
const POLL_INTERVAL  = 120_000; // 2 min

/* ── Utilities ──────────────────────────────────────────────────────────── */
const utils = {
  _toastTimer: null,

  showStatus(msg, ms = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => { el.style.display = 'none'; }, ms);
  },

  setLoading(show, label = 'Publishing…') {
    const el = document.getElementById('loading-overlay');
    el.classList.toggle('show', show);
    document.getElementById('loading-label').textContent = label;
  },

  /* Sanitise blockchain text before innerHTML injection — XSS prevention */
  safe(str) {
    const d = document.createElement('div');
    d.textContent = String(str ?? '');
    return d.innerHTML;
  },

  /* Convert safe-encoded text to HTML with line breaks */
  textToHtml(str) {
    return this.safe(str).replace(/\n/g, '<br>');
  },

  debounce(fn, ms) {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  },
};

/* ── Cache (IndexedDB) ──────────────────────────────────────────────────── */
class Cache {
  constructor() {
    this._db = null;
    this._ready = new Promise((res, rej) => {
      const req = indexedDB.open('PulseUnderground', 4);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('posts'))
          db.createObjectStore('posts', { keyPath: 'txHash' });
        if (!db.objectStoreNames.contains('profiles'))
          db.createObjectStore('profiles', { keyPath: 'address' });
      };
      req.onsuccess = () => { this._db = req.result; res(); };
      req.onerror   = () => rej(req.error);
    });
  }

  async getPosts(filterFn) {
    await this._ready;
    return new Promise((res, rej) => {
      const req = this._db.transaction('posts', 'readonly').objectStore('posts').getAll();
      req.onsuccess = () => res((req.result || []).filter(filterFn));
      req.onerror   = () => rej(req.error);
    });
  }

  async savePosts(posts) {
    await this._ready;
    return new Promise((res, rej) => {
      const tx = this._db.transaction('posts', 'readwrite');
      const s  = tx.objectStore('posts');
      posts.forEach(p => s.put(p));
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
  }

  async getProfile(address) {
    await this._ready;
    return new Promise((res, rej) => {
      const req = this._db.transaction('profiles', 'readonly').objectStore('profiles').get(address);
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => rej(req.error);
    });
  }

  async saveProfile(data) {
    await this._ready;
    return new Promise((res, rej) => {
      const tx = this._db.transaction('profiles', 'readwrite');
      tx.objectStore('profiles').put(data);
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
  }

  /* Remove cached posts older than `maxAgeDays` to keep DB lean */
  async pruneOldPosts(maxAgeDays = 7) {
    await this._ready;
    const cutoff = new Date(Date.now() - maxAgeDays * 86_400_000).toISOString();
    return new Promise((res, rej) => {
      const tx  = this._db.transaction('posts', 'readwrite');
      const s   = tx.objectStore('posts');
      const req = s.getAll();
      req.onsuccess = () => {
        (req.result || []).filter(p => p.timestamp < cutoff).forEach(p => s.delete(p.txHash));
        tx.oncomplete = res;
      };
      req.onerror = () => rej(req.error);
    });
  }
}

/* ── PulseUnderground ───────────────────────────────────────────────────── */
class PulseUnderground {
  constructor() {
    /* Application state */
    this.state = {
      posts:       [],       // currently visible posts
      pendingNew:  [],       // polled-but-not-shown posts
      searchTerm:  '',
      loading:     false,
      hasMore:     true,
      nextPage:    1,
      channel:     MAIN_CHANNEL,
      mode:        'main',   // 'main' | 'messages' | 'custom'
      profile:     { username: '', picUrl: 'image1.jpeg', bio: '' },
      signerAddr:  null,
      expanded:    new Set(),
      replyTarget: null,
      threadPost:  null,
    };

    this.signer    = null;
    this.cache     = new Cache();
    this.pollTimer = null;
    this.g = id => document.getElementById(id); // shorthand
  }

  /* ── Initialise ──────────────────────────────────────────────────────── */
  async init() {
    this.setupListeners();
    this.updateChannelLabel();
    await this.cache.pruneOldPosts();
    await this.loadCached();
    await this.tryAutoReconnect();
    await this.fetchPosts(true);
    this.startPolling();
  }

  /* ── Event wiring ────────────────────────────────────────────────────── */
  setupListeners() {
    const g = this.g.bind(this);

    /* Wallet */
    g('connect-btn').onclick = () => this.toggleWallet();

    /* Desktop nav */
    g('nav-home').onclick          = () => this.goHome();
    g('nav-messages').onclick      = () => this.goMessages();
    g('nav-profile').onclick       = () => this.openProfileModal();
    g('nav-notifications').onclick = () => this.goNotifications();

    /* Mobile nav */
    document.querySelectorAll('[data-mn]').forEach(btn => {
      btn.onclick = () => {
        const t = btn.dataset.mn;
        if (t === 'home')     this.goHome();
        if (t === 'messages') this.goMessages();
        if (t === 'profile')  this.openProfileModal();
        if (t === 'wallet')   this.toggleWallet();
      };
    });

    /* Compose */
    g('compose-input').oninput = () => {
      g('char-count').textContent = g('compose-input').value.length;
    };
    g('post-btn').onclick = () => this.publishPost();

    /* Feed — delegated clicks (handles expand, reply, thread-open) */
    g('feed').addEventListener('click', e => this.onFeedClick(e, false));

    /* Thread modal — delegated clicks (expand + reply only, no re-open thread) */
    g('thread-orig').addEventListener('click',    e => this.onFeedClick(e, true));
    g('thread-replies').addEventListener('click', e => this.onFeedClick(e, true));

    /* Search */
    g('search-input').oninput = utils.debounce(() => {
      this.state.searchTerm = g('search-input').value.trim().toLowerCase();
      this.renderFeed();
    }, 300);

    /* Feed controls */
    g('refresh-btn').onclick   = () => this.refreshFeed();
    g('new-posts-btn').onclick = () => this.loadPendingNew();

    /* Channel switcher */
    g('ch-main').onclick = () => this.goHome();
    g('ch-go').onclick   = () => this.goCustom();
    g('custom-input').onkeydown = e => { if (e.key === 'Enter') this.goCustom(); };

    /* Infinite scroll */
    window.addEventListener('scroll', utils.debounce(() => this.onScroll(), 150));

    /* Profile modal */
    g('close-profile').onclick    = () => this.closeModal('profile-modal');
    g('edit-profile-btn').onclick = () => this.showEditForm();
    g('cancel-edit-btn').onclick  = () => this.showProfileView();
    g('save-profile-btn').onclick = () => this.saveProfile();
    g('pe-pic').oninput           = () => { g('pe-preview').src = g('pe-pic').value.trim() || 'image1.jpeg'; };

    /* Reply modal */
    g('close-reply').onclick     = () => this.closeModal('reply-modal');
    g('cancel-reply-btn').onclick = () => this.closeModal('reply-modal');
    g('post-reply-btn').onclick  = () => this.postReply();

    /* Thread modal */
    g('close-thread').onclick         = () => this.closeModal('thread-modal');
    g('post-thread-reply-btn').onclick = () => this.postThreadReply();

    /* Backdrop clicks close modals */
    ['profile-modal', 'reply-modal', 'thread-modal'].forEach(id => {
      g(id).addEventListener('click', e => { if (e.target === g(id)) this.closeModal(id); });
    });
  }

  /* ── Delegated feed click handler ────────────────────────────────────── */
  onFeedClick(e, inModal) {
    const actionEl = e.target.closest('[data-action]');
    const action   = actionEl?.dataset.action;
    const itemEl   = e.target.closest('.post-item');
    if (!itemEl) return;

    const txHash = itemEl.dataset.txhash;
    const post   = this.state.posts.find(p => p.txHash === txHash);
    if (!post) return;

    if (action === 'expand') {
      e.stopPropagation();
      this.state.expanded.has(txHash)
        ? this.state.expanded.delete(txHash)
        : this.state.expanded.add(txHash);
      this.renderFeed();
    } else if (action === 'reply') {
      e.stopPropagation();
      this.openReplyModal(post);
    } else if (!action && !inModal && !e.target.closest('a') && !e.target.closest('button')) {
      this.openThread(post);
    }
  }

  /* ── Navigation ──────────────────────────────────────────────────────── */
  async goHome() {
    this.setNav('nav-home', 'home');
    this.state.mode    = 'main';
    this.state.channel = MAIN_CHANNEL;
    this.g('feed-title').textContent     = 'The Pulse Underground';
    this.g('compose-area').style.display = 'flex';
    this.g('ch-main').classList.add('active');
    this.updateChannelLabel();
    await this.resetAndFetch();
  }

  async goNotifications() {
    if (!this.signer) { utils.showStatus('Connect wallet to view Notifications'); return; }
    this.setNav('nav-notifications', null);
    this.state.mode    = 'custom';
    this.state.channel = this.state.signerAddr;
    this.g('feed-title').textContent     = '🔔 Notifications';
    this.g('compose-area').style.display = 'none';
    this.g('ch-main').classList.remove('active');
    this.updateChannelLabel();
    await this.resetAndFetch();
  }

  async goMessages() {
    if (!this.signer) { utils.showStatus('Connect wallet to view Messages'); return; }
    this.setNav('nav-messages', 'messages');
    this.state.mode    = 'messages';
    this.state.channel = this.state.signerAddr;
    this.g('feed-title').textContent     = '✉️ My Messages';
    this.g('compose-area').style.display = 'none';
    this.g('ch-main').classList.remove('active');
    this.updateChannelLabel();
    await this.resetAndFetch();
  }

  async goCustom() {
    const raw  = this.g('custom-input').value.trim().toLowerCase();
    if (!ethers.utils.isAddress(raw)) { utils.showStatus('Invalid address'); return; }
    this.setNav(null, null);
    this.state.mode    = 'custom';
    this.state.channel = raw;
    this.g('feed-title').textContent     = `📬 ${this.truncAddr(raw)}`;
    this.g('compose-area').style.display = 'flex';
    this.g('ch-main').classList.remove('active');
    this.updateChannelLabel();
    await this.resetAndFetch();
  }

  setNav(desktopId, mobileKey) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.mn-btn').forEach(b => b.classList.remove('active'));
    if (desktopId) this.g(desktopId).classList.add('active');
    if (mobileKey) {
      document.querySelector(`[data-mn="${mobileKey}"]`)?.classList.add('active');
    }
  }

  updateChannelLabel() {
    const { mode, channel, signerAddr } = this.state;
    let txt = '';
    if (mode === 'main')     txt = `Main: ${this.truncAddr(MAIN_CHANNEL)}`;
    if (mode === 'messages') txt = `Sent from: ${this.truncAddr(signerAddr || '')}`;
    if (mode === 'custom')   txt = `Channel: ${this.truncAddr(channel)}`;
    this.g('ch-label').textContent = txt;
  }

  async resetAndFetch() {
    this.stopPolling();
    this.state.posts      = [];
    this.state.pendingNew = [];
    this.state.nextPage   = 1;
    this.state.hasMore    = true;
    this.state.expanded.clear();
    this.g('new-posts-btn').style.display = 'none';
    await this.loadCached();
    await this.fetchPosts(true);
    this.startPolling();
  }

  /* ── Wallet ──────────────────────────────────────────────────────────── */
  async tryAutoReconnect() {
    if (!window.ethereum) return;
    try {
      const prov = new ethers.providers.Web3Provider(window.ethereum);
      const accs = await prov.listAccounts();
      if (accs.length && localStorage.getItem('pulseConnected') === '1') {
        this.signer = prov.getSigner();
        this.state.signerAddr = (await this.signer.getAddress()).toLowerCase();
        await this.afterConnect();
      }
    } catch (err) { console.warn('Auto-reconnect failed', err); }
  }

  async toggleWallet() {
    this.signer ? this.disconnect() : await this.connect();
  }

  async connect() {
    if (!window.ethereum) { utils.showStatus('MetaMask not detected'); return; }
    try {
      const prov = new ethers.providers.Web3Provider(window.ethereum);
      if ((await prov.getNetwork()).chainId !== PULSE_CHAIN_ID) {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x171' }]
        });
      }
      await prov.send('eth_requestAccounts', []);
      this.signer = prov.getSigner();
      this.state.signerAddr = (await this.signer.getAddress()).toLowerCase();
      localStorage.setItem('pulseConnected', '1');
      await this.afterConnect();
      utils.showStatus('Wallet connected ✓');
    } catch (err) { utils.showStatus('Connect failed: ' + (err.message || err)); }
  }

  async afterConnect() {
    const addr = this.state.signerAddr;
    this.g('wallet-display').textContent   = this.truncAddr(addr);
    this.g('wallet-display').style.display = 'block';
    this.g('connect-btn').textContent      = 'Disconnect';
    this.g('connect-btn').classList.add('secondary');

    // Load profile: cache first, then chain
    const cached = await this.cache.getProfile(addr);
    if (cached) this.applyProfile(cached);
    await this.fetchOnChainProfile(); // updates cache too
    this.renderFeed();
  }

  disconnect() {
    this.signer = null;
    this.state.signerAddr = null;
    this.state.profile    = { username: '', picUrl: 'image1.jpeg', bio: '' };
    this.g('wallet-display').style.display = 'none';
    this.g('connect-btn').textContent      = 'Connect Wallet';
    this.g('connect-btn').classList.remove('secondary');
    this.g('compose-avatar').src = 'image1.jpeg';
    localStorage.removeItem('pulseConnected');
    this.renderFeed();
    utils.showStatus('Wallet disconnected');
  }

  /* ── Profile ─────────────────────────────────────────────────────────── */

  /*
   * Profile is stored as a 0-value self-send transaction:
   *   from = to = userAddress
   *   data = "PROFILE_DATA:" + JSON.stringify({ username, picUrl, bio })
   *
   * We scan the first page of the user's tx history for the most recent
   * self-send with this prefix — that's the current profile.
   */
  async fetchOnChainProfile() {
    if (!this.state.signerAddr) return;
    try {
      const url  = `https://api.scan.pulsechain.com/api?module=account&action=txlist`
                 + `&address=${this.state.signerAddr}&offset=50&page=1&sort=desc`;
      const res  = await fetch(url);
      if (!res.ok) return;
      const data = await res.json();
      if (data.status !== '1' || !Array.isArray(data.result)) return;

      for (const tx of data.result) {
        const from = tx.from?.toLowerCase();
        const to   = tx.to?.toLowerCase();
        if (from !== this.state.signerAddr || to !== this.state.signerAddr) continue;
        try {
          const text = ethers.utils.toUtf8String(tx.input).trim();
          if (!text.startsWith(PROFILE_PREFIX)) continue;
          const parsed = JSON.parse(text.slice(PROFILE_PREFIX.length).trim());
          this.applyProfile(parsed);
          await this.cache.saveProfile({ address: this.state.signerAddr, ...parsed });
          return; // most recent profile found
        } catch { continue; }
      }
    } catch (err) { console.warn('Profile fetch error', err); }
  }

  applyProfile(data) {
    this.state.profile = {
      username: data.username || '',
      picUrl:   data.picUrl || data.profilePicUrl || 'image1.jpeg',
      bio:      data.bio     || '',
    };
    this.g('compose-avatar').src = this.state.profile.picUrl;
  }

  openProfileModal() {
    if (!this.state.signerAddr) { utils.showStatus('Connect wallet first'); return; }
    this.showProfileView();
    this.g('profile-modal').classList.add('open');
  }

  showProfileView() {
    const p = this.state.profile;
    this.g('pv-avatar').src         = p.picUrl || 'image1.jpeg';
    this.g('pv-name').textContent   = p.username || this.truncAddr(this.state.signerAddr);
    this.g('pv-bio').textContent    = p.bio      || 'No bio yet.';
    this.g('profile-view').style.display = 'block';
    this.g('profile-edit').style.display = 'none';
    this.g('profile-modal-title').textContent = 'Profile';
  }

  showEditForm() {
    const p = this.state.profile;
    this.g('pe-name').value    = p.username || '';
    this.g('pe-pic').value     = p.picUrl !== 'image1.jpeg' ? (p.picUrl || '') : '';
    this.g('pe-bio').value     = p.bio     || '';
    this.g('pe-preview').src   = p.picUrl  || 'image1.jpeg';
    this.g('profile-view').style.display = 'none';
    this.g('profile-edit').style.display = 'block';
    this.g('profile-modal-title').textContent = 'Edit Profile';
  }

  async saveProfile() {
    const username = this.g('pe-name').value.trim();
    let   picUrl   = this.g('pe-pic').value.trim() || 'image1.jpeg';
    const bio      = this.g('pe-bio').value.trim();

    // Validate image URL before saving
    if (picUrl !== 'image1.jpeg') {
      const ok = await new Promise(r => {
        const img = new Image();
        img.onload  = () => r(true);
        img.onerror = () => r(false);
        img.src = picUrl;
      });
      if (!ok) { picUrl = 'image1.jpeg'; utils.showStatus('Image URL invalid — using default'); }
    }

    const profileData = { username, picUrl, bio };
    this.applyProfile(profileData);
    await this.cache.saveProfile({ address: this.state.signerAddr, ...profileData });

    // Publish on-chain as a self-send (toAddress = own wallet, no channel mutation)
    const txData = PROFILE_PREFIX + JSON.stringify(profileData);
    const ok = await this.publish(txData, null, this.state.signerAddr);
    if (ok) {
      this.closeModal('profile-modal');
      this.renderFeed();
      utils.showStatus('Profile saved on-chain ✓');
    }
  }

  /* ── Fetch pipeline ──────────────────────────────────────────────────── */

  /*
   * Which address to query depends on mode:
   *   main / custom → query the channel address (incoming txs to that address)
   *   messages      → query the user's address  (we'll filter by from=user)
   */
  queryAddress() {
    return this.state.mode === 'messages'
      ? this.state.signerAddr
      : this.state.channel;
  }

  async fetchOnePage(page) {
    const addr = this.queryAddress();
    if (!addr) return [];
    const url  = `https://api.scan.pulsechain.com/api?module=account&action=txlist`
               + `&address=${addr}&offset=50&page=${page}&sort=desc`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`API HTTP ${res.status}`);
    const data = await res.json();
    // status "0" with "No transactions found" is normal — not an error
    return (data.status === '1' && Array.isArray(data.result)) ? data.result : [];
  }

  /*
   * Fetch loop:
   *   • Fetches pages sequentially until we've accumulated POSTS_TARGET new posts
   *     OR we've scanned MAX_PAGES pages (safety cap) OR we've hit end of history.
   *   • Renders incrementally — user sees results as they arrive.
   *   • No arbitrary sleeps between pages.
   */
  async fetchPosts(reset = false) {
    if (this.state.loading) return;
    this.state.loading = true;

    if (reset) {
      this.state.nextPage = 1;
      this.state.hasMore  = true;
    }

    this.g('loading-more').style.display = 'block';

    let newFound  = 0;
    let pagesRead = 0;

    try {
      while (newFound < POSTS_TARGET && this.state.hasMore && pagesRead < MAX_PAGES) {
        let raw;
        try {
          raw = await this.fetchOnePage(this.state.nextPage);
        } catch (err) {
          utils.showStatus('Fetch error — ' + err.message);
          break;
        }

        this.state.nextPage++;
        pagesRead++;
        this.state.hasMore = raw.length === 50; // fewer than 50 = last page

        const parsed = this.parseTxs(raw);
        const knownHashes = new Set(this.state.posts.map(p => p.txHash));
        const unique = parsed.filter(p => !knownHashes.has(p.txHash));

        if (unique.length > 0) {
          this.state.posts = [...this.state.posts, ...unique]
            .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          await this.cache.savePosts(unique);
          newFound += unique.length;
          this.renderFeed(); // show results as they come in
        }
      }

      // If we found nothing at all, render the empty state
      if (this.state.posts.length === 0) this.renderFeed();

    } finally {
      this.state.loading = false;
      this.g('loading-more').style.display = 'none';
    }
  }

  /*
   * Parse raw PulseScan txs into post objects, filtered by current mode.
   *
   *   main / custom → incoming txs (to === channel), any sender
   *   messages      → outgoing txs (from === user), any recipient
   *
   * Profile saves (PROFILE_DATA: prefix self-sends) are always excluded
   * from the visible feed.
   */
  parseTxs(txs) {
    const { mode, channel, signerAddr } = this.state;

    return txs.reduce((acc, tx) => {
      if (!tx.input || tx.input === '0x') return acc;
      const from = tx.from?.toLowerCase();
      const to   = tx.to?.toLowerCase();

      // Decode once per tx
      let raw;
      try { raw = ethers.utils.toUtf8String(tx.input).trim(); }
      catch { return acc; } // binary / non-UTF8 tx — skip
      if (!raw) return acc;

      // Mode-based filtering
      if (mode === 'messages') {
        if (from !== signerAddr) return acc;         // only outgoing
        if (raw.startsWith(PROFILE_PREFIX)) return acc; // no profile saves
      } else {
        if (to !== channel) return acc;              // only incoming to channel
      }

      const replyMatch = raw.match(/^REPLY_TO:(0x[a-f0-9]{64})\n\n/i);
      const parentTx   = replyMatch ? replyMatch[1].toLowerCase() : null;
      const display    = replyMatch ? raw.slice(replyMatch[0].length).trim() : raw;
      if (!display) return acc;

      acc.push({
        content:   raw,
        display,
        parentTx,
        reporter:  tx.from.toLowerCase(),
        to:        tx.to?.toLowerCase() ?? null,
        timestamp: tx.timeStamp
          ? new Date(Number(tx.timeStamp) * 1000).toISOString()
          : new Date().toISOString(),
        txHash:    tx.hash.toLowerCase(),
        channel,
        mode,
      });
      return acc;
    }, []);
  }

  /* ── Polling ─────────────────────────────────────────────────────────── */
  startPolling()  { this.pollTimer = setInterval(() => this.pollNew(), POLL_INTERVAL); }
  stopPolling()   { clearInterval(this.pollTimer); }

  async pollNew() {
    if (!this.state.channel || this.state.loading) return;
    const latestTs = this.state.posts[0]
      ? new Date(this.state.posts[0].timestamp)
      : new Date(0);
    try {
      const raw   = await this.fetchOnePage(1);
      const found = this.parseTxs(raw).filter(p =>
        new Date(p.timestamp) > latestTs &&
        !this.state.posts.some(x => x.txHash === p.txHash) &&
        !this.state.pendingNew.some(x => x.txHash === p.txHash)
      );
      if (found.length) {
        this.state.pendingNew = [...found, ...this.state.pendingNew];
        const btn = this.g('new-posts-btn');
        const n   = this.state.pendingNew.length;
        btn.textContent   = `✦ ${n} new post${n > 1 ? 's' : ''} — click to load`;
        btn.style.display = 'block';
      }
    } catch (err) { console.warn('Poll error', err); }
  }

  loadPendingNew() {
    this.state.posts      = [...this.state.pendingNew, ...this.state.posts];
    this.state.pendingNew = [];
    this.g('new-posts-btn').style.display = 'none';
    this.renderFeed();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async refreshFeed() {
    const btn = this.g('refresh-btn');
    btn.textContent      = '↻ Refreshing…';
    this.state.posts      = [];
    this.state.pendingNew = [];
    this.state.nextPage   = 1;
    this.state.hasMore    = true;
    this.g('new-posts-btn').style.display = 'none';
    await this.fetchPosts(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    btn.textContent = '↺ Refresh';
  }

  /* ── Cache helpers ───────────────────────────────────────────────────── */
  async loadCached() {
    const { mode, channel, signerAddr } = this.state;
    const posts = await this.cache.getPosts(p => {
      if (mode === 'messages') return p.mode === 'messages' && p.reporter === signerAddr;
      return p.channel === channel && p.mode !== 'messages';
    });
    this.state.posts = posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    this.renderFeed();
  }

  /* ── Render ──────────────────────────────────────────────────────────── */
  renderFeed() {
    const feed = this.g('feed');
    const term = this.state.searchTerm;

    const visible = term
      ? this.state.posts.filter(p =>
          p.display.toLowerCase().includes(term) ||
          p.reporter.toLowerCase().includes(term)
        )
      : this.state.posts;

    if (!visible.length) {
      feed.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📡</span>
          <h3>${this.state.loading ? 'Scanning the chain…' : 'Nothing here yet'}</h3>
          <p>${this.state.loading
            ? `Checked ${this.state.nextPage - 1} page${this.state.nextPage > 2 ? 's' : ''} so far`
            : 'Be the first to post in this channel'}</p>
        </div>`;
      return;
    }

    const frag = document.createDocumentFragment();
    visible.forEach(post => {
      const el = document.createElement('div');
      el.className        = 'post-item';
      el.dataset.txhash   = post.txHash;
      el.innerHTML        = this.postHTML(post, false);
      frag.appendChild(el);
    });
    feed.innerHTML = '';
    feed.appendChild(frag);
  }

  /*
   * Build the inner HTML for a post card.
   * All blockchain text goes through utils.safe() to prevent XSS.
   * inModal = true → always show full text (no read-more truncation)
   */
  postHTML(post, inModal) {
    const isOwn    = post.reporter === this.state.signerAddr;
    const expanded = this.state.expanded.has(post.txHash);
    const picUrl   = isOwn ? (this.state.profile.picUrl || 'image1.jpeg') : 'image1.jpeg';
    const name     = isOwn && this.state.profile.username
      ? utils.safe(this.state.profile.username)
      : this.truncAddr(post.reporter);

    // Safe render — XSS-proof
    const safeText  = utils.safe(post.display);
    const needsMore = !inModal && !expanded && post.display.length > MAX_PREVIEW;
    const bodyHtml  = needsMore
      ? utils.safe(post.display.slice(0, MAX_PREVIEW)).replace(/\n/g, '<br>') + '<span style="color:var(--muted)">…</span>'
      : safeText.replace(/\n/g, '<br>');

    const replyBadge = post.parentTx
      ? `<div class="reply-badge">↳ Replying to ${this.truncAddr(post.parentTx)}</div>`
      : '';

    const otterHref = `https://otter.pulsechain.com/tx/${post.txHash}`;

    return `
      <div class="post-header">
        <img src="${utils.safe(picUrl)}" class="post-avatar" alt=""
          onerror="this.src='image1.jpeg'">
        <div class="post-meta">
          <div>
            <span class="post-name">${name}</span>
            <span class="post-handle">@${this.truncAddr(post.reporter)}</span>
          </div>
          <div class="post-time">${this.relTime(post.timestamp)}</div>
        </div>
      </div>
      ${replyBadge}
      <div class="post-body">${bodyHtml}</div>
      ${needsMore ? `<button class="read-more-btn" data-action="expand">Read more ↓</button>` : ''}
      <div class="post-actions">
        <button class="act-btn" data-action="reply">💬 Reply</button>
        <a href="${otterHref}" target="_blank" class="otter-link"
          onclick="event.stopPropagation()">tx ↗</a>
      </div>`;
  }

  /* ── Publish ─────────────────────────────────────────────────────────── */

  /*
   * Core publish function.
   * toAddress defaults to the current channel.
   * For profile saves, pass the user's own address.
   * No state.channel mutation — race condition fixed.
   */
  async publish(content, parentTx = null, toAddress = null) {
    if (!this.signer) { utils.showStatus('Connect wallet first'); return false; }
    if (!content?.trim()) { utils.showStatus('Message is empty'); return false; }

    let finalContent = content.trim();
    if (parentTx) finalContent = `${REPLY_PREFIX}${parentTx}\n\n${finalContent}`;

    const to = toAddress || this.state.channel;
    utils.setLoading(true, 'Publishing…');

    try {
      const bytes   = ethers.utils.toUtf8Bytes(finalContent);
      const data    = ethers.utils.hexlify(bytes);
      const txReq   = { to, value: '0', data };
      let   gas     = await this.signer.estimateGas(txReq);
      gas           = gas.mul(130).div(100); // +30% buffer
      const tx      = await this.signer.sendTransaction({ ...txReq, gasLimit: gas });
      const receipt = await tx.wait();
      const hash    = receipt.transactionHash.toLowerCase();

      const newPost = {
        content:   finalContent,
        display:   content.trim(),
        parentTx,
        reporter:  this.state.signerAddr,
        to:        to.toLowerCase(),
        timestamp: new Date().toISOString(),
        txHash:    hash,
        channel:   this.state.channel,
        mode:      this.state.mode,
      };

      // Only inject into feed if this is a visible post (not a profile save)
      const isProfileSave = finalContent.startsWith(PROFILE_PREFIX);
      if (!isProfileSave) {
        this.state.posts.unshift(newPost);
        await this.cache.savePosts([newPost]);
        this.renderFeed();
      }

      utils.showStatus(`Posted ✓  ${this.truncAddr(hash)}`);
      return true;
    } catch (err) {
      utils.showStatus('Failed: ' + (err.reason || err.message || 'Unknown error'));
      return false;
    } finally {
      utils.setLoading(false);
    }
  }

  async publishPost() {
    const text = this.g('compose-input').value.trim();
    if (!text) return;
    const ok = await this.publish(text);
    if (ok) {
      this.g('compose-input').value  = '';
      this.g('char-count').textContent = '0';
    }
  }

  /* ── Reply ───────────────────────────────────────────────────────────── */
  openReplyModal(post) {
    this.state.replyTarget = post;
    const preview = post.display.length > 100
      ? post.display.slice(0, 100) + '…'
      : post.display;
    this.g('reply-quote').textContent  = `↳ ${this.truncAddr(post.reporter)}: "${preview}"`;
    this.g('reply-input').value        = '';
    this.g('reply-modal').classList.add('open');
    this.g('reply-input').focus();
  }

  async postReply() {
    const text = this.g('reply-input').value.trim();
    if (!text || !this.state.replyTarget) return;
    const ok = await this.publish(text, this.state.replyTarget.txHash);
    if (ok) {
      this.closeModal('reply-modal');
      this.g('reply-input').value = '';
    }
  }

  /* ── Thread ──────────────────────────────────────────────────────────── */
  openThread(post) {
    this.state.threadPost = post;

    // Original post — always show full text in modal
    const origEl = document.createElement('div');
    origEl.className      = 'post-item';
    origEl.dataset.txhash = post.txHash;
    origEl.innerHTML      = this.postHTML(post, true);
    origEl.style.border   = 'none';
    origEl.style.cursor   = 'default';
    this.g('thread-orig').innerHTML = '';
    this.g('thread-orig').appendChild(origEl);

    // Replies
    const replies = this.state.posts
      .filter(p => p.parentTx === post.txHash)
      .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

    const replyContainer = this.g('thread-replies');
    if (replies.length) {
      replyContainer.innerHTML = '';
      replies.forEach(r => {
        const el = document.createElement('div');
        el.className      = 'post-item thread-reply';
        el.dataset.txhash = r.txHash;
        el.innerHTML      = this.postHTML(r, true);
        replyContainer.appendChild(el);
      });
    } else {
      replyContainer.innerHTML =
        '<p style="color:var(--muted);font-size:14px;padding:12px 0">No replies yet — be the first!</p>';
    }

    this.g('thread-reply-input').value = '';
    this.g('thread-modal').classList.add('open');
  }

  async postThreadReply() {
    const text = this.g('thread-reply-input').value.trim();
    if (!text || !this.state.threadPost) return;
    const ok = await this.publish(text, this.state.threadPost.txHash);
    if (ok) {
      this.g('thread-reply-input').value = '';
      this.openThread(this.state.threadPost); // refresh replies
    }
  }

  closeModal(id) { this.g(id).classList.remove('open'); }

  /* ── Infinite scroll ─────────────────────────────────────────────────── */
  onScroll() {
    if (this.state.hasMore && !this.state.loading) {
      const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 500;
      if (nearBottom) this.fetchPosts(false);
    }
  }

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  truncAddr = a =>
    a && a.length > 10 ? `${a.slice(0, 6)}…${a.slice(-4)}` : (a || '');

  relTime = ts => {
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60)    return 'just now';
    if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
    if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
}

/* ── Boot ───────────────────────────────────────────────────────────────── */
const pulse = new PulseUnderground();
pulse.init().catch(err => {
  console.error('Init error:', err);
  utils.showStatus('Init failed — check console');
});
</script>
</body>
</html>
