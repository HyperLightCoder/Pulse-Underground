<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Underground</title>
<link rel="icon" type="image/jpeg" href="image1.jpeg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
/* ─── Variables ─────────────────────────────────────────────────────────── */
:root {
  --primary:      #7c4dff;
  --primary-lt:   #b388ff;
  --primary-dim:  rgba(124,77,255,0.15);
  --wave-a:       #ff3cac;
  --wave-b:       #784ba0;
  --wave-c:       #2b86c5;
  --bg-dark:      #0d0b14;
  --bg-light:     #13101c;
  --bg-mid:       #1c1728;
  --border:       #2a2438;
  --text:         #e8e6f0;
  --muted:        #7a7590;
  --green:        #00e5a0;
  --neon:         0 0 8px rgba(124,77,255,0.6), 0 0 20px rgba(124,77,255,0.2);
  --wave-neon:    0 0 12px rgba(255,60,172,0.5), 0 0 28px rgba(120,75,160,0.3);
}

/* ─── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  line-height: 1.5;
  font-size: 15px;
  min-height: 100vh;
}
button, input, textarea { font-family: inherit; }
a { color: inherit; }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  max-width: 1280px;
  margin: 0 auto;
  min-height: 100vh;
}

/* ─── Left sidebar ───────────────────────────────────────────────────────── */
#sidebar-left {
  width: 240px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-light);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  overflow-y: auto;
}
.logo-wrap { text-align: center; margin-bottom: 20px; }
.logo-wrap img {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  object-fit: cover;
}
.logo-wrap .site-name {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary-lt);
  margin-top: 6px;
  font-weight: 600;
}
nav { flex: 1; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 11px 14px;
  background: transparent;
  border: none;
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  position: relative;
  transition: background 0.18s, color 0.18s, box-shadow 0.18s;
  margin-bottom: 2px;
}
.nav-btn:hover  { background: var(--bg-mid); color: var(--primary-lt); }
.nav-btn.active { background: var(--primary-dim); color: var(--primary-lt); box-shadow: var(--neon); }
.nav-icon { font-size: 19px; width: 22px; text-align: center; }
/* notification count badge */
.notif-badge {
  display: none;
  position: absolute;
  top: 8px; right: 10px;
  min-width: 18px; height: 18px;
  padding: 0 5px;
  background: var(--wave-a);
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  color: #fff;
}
.notif-badge.on { display: block; }
#sidebar-bottom { margin-top: auto; padding-top: 16px; }
.wallet-pill {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  word-break: break-all;
  padding: 6px;
  background: var(--bg-dark);
  border-radius: 8px;
  margin-bottom: 8px;
  display: none;
}
#connect-btn {
  width: 100%;
  padding: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-lt));
  color: #fff;
  border: none;
  border-radius: 24px;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
#connect-btn:hover { box-shadow: var(--neon); }
#connect-btn.ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  padding: 8px;
}

/* ─── Main column ────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  min-width: 0;
  background: var(--bg-light);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
#feed-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(19,16,28,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#feed-title { font-size: 17px; font-weight: 700; color: var(--primary-lt); }
#refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
#refresh-btn:hover { border-color: var(--primary); color: var(--primary-lt); }
/* "N new posts" banner */
#new-banner {
  display: none;
  width: 100%;
  padding: 10px;
  background: var(--primary);
  border: none;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background 0.2s;
}
#new-banner:hover { background: var(--primary-lt); }
/* Compose */
#compose-area {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.compose-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.compose-body { flex: 1; min-width: 0; }
#compose-text {
  width: 100%;
  min-height: 76px;
  padding: 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  resize: none;
  transition: border-color 0.2s;
}
#compose-text:focus { outline: none; border-color: var(--primary); }
#compose-text::placeholder { color: var(--muted); }
.compose-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.char-count { font-size: 13px; color: var(--muted); }
#post-btn {
  padding: 8px 22px;
  background: linear-gradient(135deg, var(--primary), var(--primary-lt));
  border: none;
  border-radius: 20px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
#post-btn:hover { box-shadow: var(--neon); }
/* Feed */
#feed { flex: 1; }
.post-item {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.post-item:hover { background: var(--bg-mid); }
.post-hdr { display: flex; gap: 10px; margin-bottom: 8px; }
.post-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--bg-dark);
}
.post-meta { flex: 1; min-width: 0; }
.post-name   { font-weight: 700; font-size: 14px; }
.post-handle { color: var(--muted); font-size: 13px; margin-left: 4px; }
.post-time   { color: var(--muted); font-size: 12px; }
/* direction badge for inbox */
.dir-badge {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}
.dir-sent     { background: rgba(124,77,255,0.15); color: var(--primary-lt); }
.dir-received { background: rgba(0,229,160,0.12);  color: var(--green); }
.to-label     { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
.reply-badge  { font-size: 12px; color: var(--primary-lt); margin-bottom: 6px; display: block; }
.post-body    { font-size: 15px; line-height: 1.65; word-break: break-word; color: var(--text); margin-bottom: 10px; }
.read-more-btn {
  background: none; border: none;
  color: var(--primary-lt); font-size: 13px; font-weight: 600;
  cursor: pointer; padding: 0; margin-bottom: 10px; display: block;
}
.read-more-btn:hover { color: #fff; }
.post-actions { display: flex; align-items: center; gap: 8px; }
.act-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 20px;
  color: var(--muted); font-size: 13px; cursor: pointer;
  transition: all 0.18s;
}
.act-btn:hover { border-color: var(--primary); color: var(--primary-lt); }
.otter-link {
  font-size: 12px; color: var(--muted);
  text-decoration: none; padding: 5px 8px;
  border-radius: 20px; transition: color 0.18s;
}
.otter-link:hover { color: var(--primary-lt); }
#loading-more {
  display: none; padding: 24px;
  text-align: center; color: var(--primary-lt); font-size: 13px;
  font-style: italic;
}
.empty-state { padding: 64px 24px; text-align: center; color: var(--muted); }
.empty-icon  { font-size: 44px; margin-bottom: 16px; display: block; }
.empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }

/* ─── Right sidebar ──────────────────────────────────────────────────────── */
#sidebar-right {
  width: 270px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  background: var(--bg-light);
  border-left: 1px solid var(--border);
  padding: 20px 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sb-section { margin-bottom: 20px; }
.sb-title {
  font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: 1.2px;
  text-transform: uppercase; margin-bottom: 10px;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--primary); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--muted); pointer-events: none;
}
.ch-btn {
  display: block; width: 100%;
  padding: 9px 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px;
  cursor: pointer; text-align: left;
  transition: all 0.18s; margin-bottom: 6px;
}
.ch-btn:hover  { border-color: var(--primary); color: var(--primary-lt); }
.ch-btn.active { border-color: var(--primary); color: var(--primary-lt); background: var(--primary-dim); }
#ch-self { display: none; } /* revealed on wallet connect */
.custom-row { display: flex; gap: 6px; margin-top: 4px; }
.custom-row input {
  flex: 1; min-width: 0;
  padding: 8px 10px;
  background: var(--bg-dark);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px; outline: none;
}
.custom-row input:focus { border-color: var(--primary); }
.custom-row input::placeholder { color: var(--muted); }
.go-btn {
  padding: 8px 12px;
  background: var(--primary); border: none;
  border-radius: 8px; color: #fff;
  font-size: 12px; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
  transition: box-shadow 0.2s;
}
.go-btn:hover { box-shadow: var(--neon); }
.ch-label { font-size: 11px; color: var(--muted); margin-top: 8px; word-break: break-all; line-height: 1.5; }

/* ─── Wave on Pulse card ─────────────────────────────────────────────────── */
#wave-card { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
.wave-inner {
  background: linear-gradient(135deg, rgba(255,60,172,0.08), rgba(43,134,197,0.08));
  border: 1px solid rgba(255,60,172,0.25);
  border-radius: 14px; padding: 14px;
  cursor: pointer; transition: all 0.25s;
}
.wave-inner:hover {
  border-color: rgba(255,60,172,0.5);
  box-shadow: var(--wave-neon);
  transform: translateY(-1px);
}
.wave-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 8px;
}
.wave-brand { display: flex; align-items: center; gap: 8px; }
.wave-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--wave-a), var(--wave-b), var(--wave-c));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.wave-name {
  font-size: 13px; font-weight: 700;
  background: linear-gradient(90deg, var(--wave-a), var(--wave-c));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.2;
}
.wave-sub   { font-size: 10px; color: var(--muted); }
.wave-tune  { font-size: 10px; font-weight: 700; color: var(--wave-a); letter-spacing: 0.5px; }
.wave-bars  { display: flex; align-items: flex-end; gap: 3px; height: 20px; margin-bottom: 8px; }
.wave-bars span {
  width: 3px; border-radius: 2px;
  background: linear-gradient(to top, var(--wave-a), var(--wave-c));
  animation: wbar 1s ease-in-out infinite;
}
.wave-bars span:nth-child(1){height:40%;animation-delay:0s}
.wave-bars span:nth-child(2){height:70%;animation-delay:.1s}
.wave-bars span:nth-child(3){height:100%;animation-delay:.2s}
.wave-bars span:nth-child(4){height:60%;animation-delay:.3s}
.wave-bars span:nth-child(5){height:85%;animation-delay:.15s}
.wave-bars span:nth-child(6){height:45%;animation-delay:.25s}
.wave-bars span:nth-child(7){height:75%;animation-delay:.05s}
@keyframes wbar { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.4)} }
.wave-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* ─── Mobile nav ─────────────────────────────────────────────────────────── */
#mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-light);
  border-top: 1px solid var(--border);
  z-index: 100;
  justify-content: space-around;
  padding: 6px 0 10px;
}
.mn-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--muted);
  font-size: 10px; cursor: pointer; padding: 6px 10px;
  border-radius: 8px; position: relative; transition: color 0.18s;
}
.mn-btn .mn-icon { font-size: 20px; line-height: 1; }
.mn-btn.active, .mn-btn:hover { color: var(--primary-lt); }
.mn-dot {
  display: none; position: absolute; top: 2px; right: 6px;
  width: 8px; height: 8px; background: var(--wave-a); border-radius: 50%;
}
.mn-dot.on { display: block; }

/* ─── Modals ─────────────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(10,8,18,0.85);
  display: none; align-items: center;
  justify-content: center; z-index: 500; padding: 16px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg-light);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  padding: 24px;
}
.modal.wide { max-width: 600px; }
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.18s;
}
.modal-close:hover { background: var(--bg-mid); color: var(--text); }
/* profile section */
.prof-avatar-wrap { text-align: center; margin-bottom: 20px; }
.prof-avatar-wrap img {
  width: 90px; height: 90px; border-radius: 50%;
  border: 3px solid var(--primary); object-fit: cover;
  display: block; margin: 0 auto 12px;
}
.prof-avatar-wrap h2 { font-size: 20px; margin-bottom: 4px; }
.prof-avatar-wrap p  { font-size: 13px; color: var(--muted); }
/* forms */
.form-group { margin-bottom: 14px; }
.form-lbl {
  display: block; font-size: 12px; color: var(--muted);
  margin-bottom: 5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-input, .form-textarea {
  width: 100%; padding: 10px 12px;
  background: var(--bg-dark);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--primary); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
.form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.btn-row { display: flex; gap: 8px; margin-top: 18px; }
.btn-pri {
  flex: 1; padding: 11px;
  background: linear-gradient(135deg, var(--primary), var(--primary-lt));
  border: none; border-radius: 10px;
  color: #fff; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: box-shadow 0.2s;
}
.btn-pri:hover { box-shadow: var(--neon); }
.btn-ghost {
  padding: 11px 16px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; color: var(--muted); font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--primary); color: var(--text); }
/* reply quote */
.reply-quote {
  padding: 10px 14px;
  background: var(--bg-mid);
  border-left: 3px solid var(--primary);
  border-radius: 0 8px 8px 0;
  font-size: 13px; color: var(--muted);
  margin-bottom: 14px; line-height: 1.5;
}
.thread-reply-item { padding: 14px 0; border-bottom: 1px solid var(--border); }

/* ─── Toast ──────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-mid); border: 1px solid var(--border);
  border-radius: 24px; padding: 9px 20px;
  font-size: 13px; display: none; z-index: 2000;
  box-shadow: var(--neon); white-space: nowrap; max-width: 90vw;
}

/* ─── Loading overlay ────────────────────────────────────────────────────── */
#loading-overlay {
  position: fixed; inset: 0;
  background: rgba(13,11,20,0.65);
  display: none; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 12px;
  color: var(--primary-lt); font-size: 15px;
}
#loading-overlay.on { display: flex; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 1050px) { #sidebar-right { width: 220px; } }
@media (max-width: 768px) {
  #sidebar-left, #sidebar-right { display: none; }
  #mobile-nav { display: flex; }
  #main { padding-bottom: 64px; }
  #app  { max-width: 100%; }
  #compose-area, .post-item, #feed-header { padding-left: 14px; padding-right: 14px; }
  .modal { padding: 16px; }
  #toast { bottom: 74px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Left Sidebar -->
  <div id="sidebar-left">
    <div class="logo-wrap">
      <img src="image1.jpeg" alt="Pulse Underground">
      <span class="site-name">Pulse Underground</span>
    </div>
    <nav>
      <button class="nav-btn active" id="nav-home">
        <span class="nav-icon">🏠</span>Home
      </button>
      <button class="nav-btn" id="nav-messages">
        <span class="nav-icon">✉️</span>Messages
      </button>
      <button class="nav-btn" id="nav-notifs">
        <span class="nav-icon">🔔</span>Notifications
        <span class="notif-badge" id="notif-badge"></span>
      </button>
      <button class="nav-btn" id="nav-profile">
        <span class="nav-icon">👤</span>Profile
      </button>
    </nav>
    <div id="sidebar-bottom">
      <div class="wallet-pill" id="wallet-pill"></div>
      <button id="connect-btn">Connect Wallet</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <button id="new-banner">✦ New posts — click to load</button>
    <div id="feed-header">
      <span id="feed-title">The Pulse Underground</span>
      <button id="refresh-btn">↺ Refresh</button>
    </div>
    <div id="compose-area">
      <img src="image1.jpeg" class="compose-avatar" id="compose-avatar" alt="">
      <div class="compose-body">
        <textarea id="compose-text" placeholder="What's happening on Pulse?"></textarea>
        <div class="compose-footer">
          <span class="char-count" id="char-count">0 / ∞</span>
          <button id="post-btn">Post ➤</button>
        </div>
      </div>

<!-- ═══════════════════════ JavaScript ═══════════════════════════════════ -->
<script>
'use strict';
const ethers = window.ethers;

/* ── Constants ────────────────────────────────────────────────────────── */
const MAIN_CHANNEL   = '0x9cd83be15a79646a3d22b81fc8ddf7b7240a62cb';
const PULSE_CHAIN_ID = 369;
const REPLY_PREFIX   = 'REPLY_TO:';
const PROFILE_PREFIX = 'PROFILE_DATA:';
const MAX_PREVIEW    = 500;   // chars before "Read more"
const POSTS_TARGET   = 20;    // target posts per fetch call
const MAX_PAGES      = 40;    // hard cap: 40 pages × 50 txs = 2000 txs max
const POLL_MS        = 120_000; // poll every 2 min

/*
 * WAVE_ADDRESS — replace with confirmed Wave on Pulse wallet address.
 * Format: lowercase 0x-prefixed EVM address.
 */
const WAVE_ADDRESS = '0x0000000000000000000000000000000000000001'; // TODO: replace

/* ── Utils ────────────────────────────────────────────────────────────── */
const utils = {
  _t: null,

  toast(msg, ms = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(this._t);
    this._t = setTimeout(() => { el.style.display = 'none'; }, ms);
  },

  loading(show, label = 'Publishing…') {
    document.getElementById('loading-overlay').classList.toggle('on', show);
    document.getElementById('loading-label').textContent = label;
  },

  /*
   * Sanitise any blockchain-sourced string before innerHTML injection.
   * Creates a text node so HTML entities are escaped — prevents XSS.
   */
  safe(str) {
    const d = document.createElement('div');
    d.textContent = String(str ?? '');
    return d.innerHTML;
  },

  debounce(fn, ms) {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  },
};

/* ── IndexedDB Cache ──────────────────────────────────────────────────── */
class Cache {
  constructor() {
    this._db    = null;
    this._ready = new Promise((res, rej) => {
      const req = indexedDB.open('PulseUnderground', 5);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('posts'))
          db.createObjectStore('posts', { keyPath: 'txHash' });
        if (!db.objectStoreNames.contains('profiles'))
          db.createObjectStore('profiles', { keyPath: 'address' });
      };
      req.onsuccess = () => { this._db = req.result; res(); };
      req.onerror   = () => rej(req.error);
    });
  }

  async getPosts(filterFn) {
    await this._ready;
    return new Promise((res, rej) => {
      const req = this._db.transaction('posts','readonly').objectStore('posts').getAll();
      req.onsuccess = () => res((req.result || []).filter(filterFn));
      req.onerror   = () => rej(req.error);
    });
  }

  async savePosts(posts) {
    await this._ready;
    return new Promise((res, rej) => {
      const tx = this._db.transaction('posts','readwrite');
      posts.forEach(p => tx.objectStore('posts').put(p));
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
  }

  async getProfile(address) {
    await this._ready;
    return new Promise((res, rej) => {
      const req = this._db.transaction('profiles','readonly').objectStore('profiles').get(address);
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => rej(req.error);
    });
  }

  async saveProfile(data) {
    await this._ready;
    return new Promise((res, rej) => {
      const tx = this._db.transaction('profiles','readwrite');
      tx.objectStore('profiles').put(data);
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
  }

  /* Prune posts older than maxAgeDays to keep DB lean */
  async prune(maxAgeDays = 7) {
    await this._ready;
    const cutoff = new Date(Date.now() - maxAgeDays * 86_400_000).toISOString();
    return new Promise((res, rej) => {
      const tx  = this._db.transaction('posts','readwrite');
      const s   = tx.objectStore('posts');
      const req = s.getAll();
      req.onsuccess = () => {
        (req.result || []).filter(p => p.timestamp < cutoff).forEach(p => s.delete(p.txHash));
        tx.oncomplete = res;
      };
      req.onerror = () => rej(req.error);
    });
  }
}

/* ── PulseUnderground ─────────────────────────────────────────────────── */
class PulseUnderground {
  constructor() {
    this.state = {
      posts:        [],    // visible feed items
      pending:      [],    // polled new items not yet shown
      searchTerm:   '',
      loading:      false,
      hasMore:      true,
      nextPage:     1,
      channel:      MAIN_CHANNEL,
      /*
       * mode — controls which address is queried and how results are filtered:
       *
       *   main          → TXs TO main channel address (public feed)
       *   inbox         → ALL TXs FROM or TO user (combined, direction-tagged)
       *   notifications → TXs TO user, newer than last-visit timestamp only
       *   self          → TXs TO user's own address (their public channel)
       *   custom        → TXs TO any arbitrary entered address
       *   wave          → TXs TO Wave on Pulse address (read-only)
       */
      mode:         'main',
      profile:      { username: '', picUrl: 'image1.jpeg', bio: '' },
      signerAddr:   null,
      expanded:     new Set(),   // txHash → expanded in feed
      replyTarget:  null,
      threadPost:   null,
      profCache:    {},          // address → { username, picUrl } session cache
    };

    this.signer    = null;
    this.cache     = new Cache();
    this.pollTimer = null;
    this.g         = id => document.getElementById(id);
  }

  /* ── Init ──────────────────────────────────────────────────────────── */
  async init() {
    this.wireListeners();
    this.updateChLabel();
    await this.cache.prune();
    await this.loadCached();
    await this.tryAutoReconnect();
    await this.fetchPosts(true);
    this.startPolling();
  }

  /* ── Event wiring ──────────────────────────────────────────────────── */
  wireListeners() {
    const g = this.g.bind(this);

    /* wallet */
    g('connect-btn').onclick = () => this.toggleWallet();

    /* desktop nav */
    g('nav-home').onclick    = () => this.goHome();
    g('nav-messages').onclick = () => this.goInbox();
    g('nav-notifs').onclick  = () => this.goNotifications();
    g('nav-profile').onclick = () => this.openProfileModal();

    /* mobile nav */
    document.querySelectorAll('[data-mn]').forEach(b => {
      b.onclick = () => {
        const t = b.dataset.mn;
        if (t === 'home')     this.goHome();
        if (t === 'messages') this.goInbox();
        if (t === 'wave')     this.goWave();
        if (t === 'notifs')   this.goNotifications();
        if (t === 'profile')  this.openProfileModal();
        if (t === 'wallet')   this.toggleWallet();
      };
    });

    /* compose */
    g('compose-text').oninput = () => {
      g('char-count').textContent = g('compose-text').value.length + ' / ∞';
    };
    g('post-btn').onclick = () => this.publishPost();

    /* feed — all post interactions via event delegation */
    g('feed').addEventListener('click', e => this.onFeedClick(e, false));
    g('thread-orig').addEventListener('click',    e => this.onFeedClick(e, true));
    g('thread-replies').addEventListener('click', e => this.onFeedClick(e, true));

    /* search */
    g('search-input').oninput = utils.debounce(() => {
      this.state.searchTerm = g('search-input').value.trim().toLowerCase();
      this.renderFeed();
    }, 300);

    /* feed controls */
    g('refresh-btn').onclick  = () => this.refreshFeed();
    g('new-banner').onclick   = () => this.loadPending();

    /* channel buttons */
    g('ch-main').onclick = () => this.goHome();
    g('ch-self').onclick = () => this.goSelf();
    g('ch-go').onclick   = () => this.goCustom();
    g('custom-input').onkeydown = e => { if (e.key === 'Enter') this.goCustom(); };

    /* Wave card */
    g('wave-btn').onclick   = () => this.goWave();
    g('wave-btn').onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') this.goWave(); };

    /* infinite scroll */
    window.addEventListener('scroll', utils.debounce(() => this.onScroll(), 150));

    /* profile modal */
    g('close-profile').onclick    = () => this.closeModal('profile-modal');
    g('edit-profile-btn').onclick = () => this.showEditForm();
    g('cancel-edit-btn').onclick  = () => this.showProfileView();
    g('save-profile-btn').onclick = () => this.saveProfile();
    g('pe-pic').oninput = () => { g('pe-preview').src = g('pe-pic').value.trim() || 'image1.jpeg'; };

    /* reply modal */
    g('close-reply').onclick      = () => this.closeModal('reply-modal');
    g('cancel-reply-btn').onclick = () => this.closeModal('reply-modal');
    g('post-reply-btn').onclick   = () => this.postReply();
    g('reply-input').oninput = () => {
      g('reply-count').textContent = g('reply-input').value.length + ' / ∞';
    };

    /* thread modal */
    g('close-thread').onclick          = () => this.closeModal('thread-modal');
    g('post-thread-reply-btn').onclick = () => this.postThreadReply();
    g('thread-reply-input').oninput = () => {
      g('thread-count').textContent = g('thread-reply-input').value.length + ' / ∞';
    };

    /* close modals by clicking backdrop */
    ['profile-modal','reply-modal','thread-modal'].forEach(id => {
      g(id).addEventListener('click', e => { if (e.target === g(id)) this.closeModal(id); });
    });
  }

  /* ── Delegated click handler ───────────────────────────────────────── */
  onFeedClick(e, inModal) {
    const action = e.target.closest('[data-action]')?.dataset.action;
    const item   = e.target.closest('.post-item');
    if (!item) return;

    const post = this.state.posts.find(p => p.txHash === item.dataset.txhash);
    if (!post) return;

    if (action === 'expand') {
      e.stopPropagation();
      this.state.expanded.has(post.txHash)
        ? this.state.expanded.delete(post.txHash)
        : this.state.expanded.add(post.txHash);
      this.renderFeed();
    } else if (action === 'reply') {
      e.stopPropagation();
      this.openReplyModal(post);
    } else if (!action && !inModal && !e.target.closest('a') && !e.target.closest('button')) {
      this.openThread(post);
    }
  }

  /* ── Navigation ─────────────────────────────────────────────────────── */
  async goHome() {
    this.setNav('nav-home','home');
    this.state.mode    = 'main';
    this.state.channel = MAIN_CHANNEL;
    this.g('feed-title').textContent     = 'The Pulse Underground';
    this.g('compose-area').style.display = 'flex';
    this.setChActive('ch-main');
    this.updateChLabel();
    await this.resetAndFetch();
  }

  /*
   * Inbox — combined view: all TXs FROM or TO the user's wallet.
   * Sent posts show a purple "↑ sent" badge; received show green "↓ received".
   * Also shows the recipient address on outgoing posts.
   */
  async goInbox() {
    if (!this.signer) { utils.toast('Connect wallet to view Messages'); return; }
    this.setNav('nav-messages','messages');
    this.state.mode    = 'inbox';
    this.state.channel = this.state.signerAddr;
    this.g('feed-title').textContent     = '✉️ Messages';
    this.g('compose-area').style.display = 'none';
    this.setChActive(null);
    this.updateChLabel();
    await this.resetAndFetch();
  }

  /*
   * Notifications — TXs TO the user that arrived since their last visit.
   * Opening this view marks all as read (updates localStorage timestamp).
   * Does NOT poll — it's a point-in-time snapshot.
   */
  async goNotifications() {
    if (!this.signer) { utils.toast('Connect wallet to view Notifications'); return; }
    this.setNav('nav-notifs','notifs');
    this.state.mode    = 'notifications';
    this.state.channel = this.state.signerAddr;
    this.g('feed-title').textContent     = '🔔 Notifications';
    this.g('compose-area').style.display = 'none';
    this.setChActive(null);
    this.updateChLabel();
    localStorage.setItem('pulseLastCheck', Date.now().toString());
    this.clearNotifBadge();
    await this.resetAndFetch();
  }

  /*
   * My Channel — the user's public address channel.
   * Shows ALL TXs TO the user's address (including self-posts, excluding
   * PROFILE_DATA saves). Anyone can post here — it's their public chat room.
   */
  async goSelf() {
    if (!this.signer) { utils.toast('Connect wallet to view your channel'); return; }
    this.setNav(null, null);
    this.state.mode    = 'self';
    this.state.channel = this.state.signerAddr;
    this.g('feed-title').textContent     = '📡 My Channel';
    this.g('compose-area').style.display = 'flex';
    this.setChActive('ch-self');
    this.updateChLabel();
    await this.resetAndFetch();
  }

  /* Custom — any entered 0x address; shows TXs TO that address */
  async goCustom() {
    const raw = this.g('custom-input').value.trim().toLowerCase();
    if (!ethers.utils.isAddress(raw)) { utils.toast('Invalid address'); return; }
    this.setNav(null, null);
    this.state.mode    = 'custom';
    this.state.channel = raw;
    this.g('feed-title').textContent     = `📬 ${this.trunc(raw)}`;
    this.g('compose-area').style.display = 'flex';
    this.setChActive(null);
    this.updateChLabel();
    await this.resetAndFetch();
  }

  /* Wave on Pulse — read-only broadcast channel */
  async goWave() {
    this.setNav(null, null);
    this.state.mode    = 'wave';
    this.state.channel = WAVE_ADDRESS;
    this.g('feed-title').textContent     = '📻 Wave on Pulse';
    this.g('compose-area').style.display = 'none'; // read-only
    this.setChActive(null);
    this.updateChLabel();
    await this.resetAndFetch();
  }

  setNav(desktopId, mobileKey) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.mn-btn').forEach(b => b.classList.remove('active'));
    if (desktopId) this.g(desktopId)?.classList.add('active');
    if (mobileKey) document.querySelector(`[data-mn="${mobileKey}"]`)?.classList.add('active');
  }

  setChActive(id) {
    document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
    if (id) this.g(id)?.classList.add('active');
  }

  updateChLabel() {
    const { mode, channel, signerAddr } = this.state;
    const map = {
      main:          `Main: ${this.trunc(MAIN_CHANNEL)}`,
      inbox:         `From/to: ${this.trunc(signerAddr || '')}`,
      notifications: `To: ${this.trunc(signerAddr || '')}`,
      self:          `My channel: ${this.trunc(signerAddr || '')}`,
      custom:        `Channel: ${this.trunc(channel)}`,
      wave:          `Wave: ${this.trunc(WAVE_ADDRESS)}`,
    };
    this.g('ch-label').textContent = map[mode] || '';
  }

  /* ── Notification badge ─────────────────────────────────────────────── */
  async checkNotifBadge() {
    if (!this.state.signerAddr) return;
    const lastCheck = parseInt(localStorage.getItem('pulseLastCheck') || '0', 10);
    try {
      const raw   = await this.apiFetch(this.state.signerAddr, 1);
      const count = raw.filter(tx => {
        if (tx.to?.toLowerCase()   !== this.state.signerAddr) return false;
        if (tx.from?.toLowerCase() === this.state.signerAddr) return false; // no self-sends
        if (!tx.input || tx.input === '0x') return false;
        if (Number(tx.timeStamp) * 1000 <= lastCheck) return false;
        /* Only count txs that are actually readable text posts */
        try {
          const text = ethers.utils.toUtf8String(tx.input).trim();
          return text.length > 0 && !text.startsWith(PROFILE_PREFIX);
        } catch { return false; }
      }).length;
      this.setNotifBadge(count);
    } catch { /* silent */ }
  }

  setNotifBadge(n) {
    const b  = this.g('notif-badge');
    const mb = this.g('mn-dot');
    if (n > 0) {
      b.textContent = n > 99 ? '99+' : String(n);
      b.classList.add('on');
      mb?.classList.add('on');
    } else {
      b.classList.remove('on');
      mb?.classList.remove('on');
    }
  }

  clearNotifBadge() { this.setNotifBadge(0); }

  /* ── Wallet ─────────────────────────────────────────────────────────── */
  async tryAutoReconnect() {
    if (!window.ethereum) return;
    try {
      const prov = new ethers.providers.Web3Provider(window.ethereum);
      const accs = await prov.listAccounts();
      if (accs.length && localStorage.getItem('pulseConnected') === '1') {
        this.signer = prov.getSigner();
        this.state.signerAddr = (await this.signer.getAddress()).toLowerCase();
        await this.afterConnect();
      }
    } catch (err) { console.warn('Auto-reconnect failed', err); }
  }

  async toggleWallet() { this.signer ? this.disconnect() : await this.connect(); }

  async connect() {
    if (!window.ethereum) { utils.toast('MetaMask not detected'); return; }
    try {
      const prov = new ethers.providers.Web3Provider(window.ethereum);
      if ((await prov.getNetwork()).chainId !== PULSE_CHAIN_ID) {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x171' }],
        });
      }
      await prov.send('eth_requestAccounts', []);
      this.signer = prov.getSigner();
      this.state.signerAddr = (await this.signer.getAddress()).toLowerCase();
      localStorage.setItem('pulseConnected', '1');
      await this.afterConnect();
      utils.toast('Wallet connected ✓');
    } catch (err) { utils.toast('Connect failed: ' + (err.message || err)); }
  }

  async afterConnect() {
    const addr = this.state.signerAddr;
    this.g('wallet-pill').textContent   = this.trunc(addr);
    this.g('wallet-pill').style.display = 'block';
    this.g('connect-btn').textContent   = 'Disconnect';
    this.g('connect-btn').classList.add('ghost');
    this.g('ch-self').style.display     = 'block';

    /* profile: cache → chain (chain always wins for freshness) */
    const cached = await this.cache.getProfile(addr);
    if (cached) this.applyProfile(cached);
    await this.fetchMyProfile(); // updates cache + state

    this.checkNotifBadge();
    this.renderFeed(); // re-render so own posts show avatar/name
  }

  disconnect() {
    this.signer = null;
    this.state.signerAddr = null;
    this.state.profile    = { username: '', picUrl: 'image1.jpeg', bio: '' };
    this.g('wallet-pill').style.display = 'none';
    this.g('connect-btn').textContent   = 'Connect Wallet';
    this.g('connect-btn').classList.remove('ghost');
    this.g('compose-avatar').src        = 'image1.jpeg';
    this.g('ch-self').style.display     = 'none';
    this.clearNotifBadge();
    localStorage.removeItem('pulseConnected');
    this.renderFeed();
    utils.toast('Wallet disconnected');
  }

  /* ── Profile ─────────────────────────────────────────────────────────── */

  /*
   * On-chain profile format:
   *   tx.from === tx.to === userAddress  (0-value self-send)
   *   tx.input = utf8(PROFILE_DATA: + JSON.stringify({username, picUrl, bio}))
   *
   * We scan the first page of the user's own tx history for the most recent
   * self-send with this prefix — that's the active profile.
   * We require from === to to prevent a spoofed tx from overwriting the profile.
   */
  async fetchMyProfile() {
    if (!this.state.signerAddr) return;
    try {
      const raw = await this.apiFetch(this.state.signerAddr, 1);
      for (const tx of raw) {
        if (tx.from?.toLowerCase() !== this.state.signerAddr) continue;
        if (tx.to?.toLowerCase()   !== this.state.signerAddr) continue;
        try {
          const text = ethers.utils.toUtf8String(tx.input).trim();
          if (!text.startsWith(PROFILE_PREFIX)) continue;
          const data = JSON.parse(text.slice(PROFILE_PREFIX.length).trim());
          this.applyProfile(data);
          await this.cache.saveProfile({ address: this.state.signerAddr, ...data });
          return; // most recent profile found — stop scanning
        } catch { continue; }
      }
    } catch (err) { console.warn('Profile fetch error', err); }
  }

  /*
   * Lazy-load another user's profile for their avatar/username in the feed.
   * Checks IndexedDB first (fast). Falls back to chain page 1 (one API call).
   * Results are cached in memory (profCache) so each address is only fetched once.
   * Re-renders the feed after loading so avatars appear progressively.
   */
  async fetchOtherProfile(address) {
    if (!address || address in this.state.profCache) return;
    this.state.profCache[address] = null; // mark in-flight to prevent duplicate fetches
    try {
      const db = await this.cache.getProfile(address);
      if (db) {
        this.state.profCache[address] = { username: db.username || '', picUrl: db.picUrl || 'image1.jpeg' };
        this.renderFeed();
        return;
      }
      const raw = await this.apiFetch(address, 1);
      for (const tx of raw) {
        if (tx.from?.toLowerCase() !== address || tx.to?.toLowerCase() !== address) continue;
        try {
          const text = ethers.utils.toUtf8String(tx.input).trim();
          if (!text.startsWith(PROFILE_PREFIX)) continue;
          const data = JSON.parse(text.slice(PROFILE_PREFIX.length).trim());
          this.state.profCache[address] = { username: data.username || '', picUrl: data.picUrl || 'image1.jpeg' };
          await this.cache.saveProfile({ address, ...data });
          this.renderFeed();
          return;
        } catch { continue; }
      }
      this.state.profCache[address] = { username: '', picUrl: 'image1.jpeg' };
    } catch {
      this.state.profCache[address] = { username: '', picUrl: 'image1.jpeg' };
    }
  }

  applyProfile(data) {
    this.state.profile = {
      username: data.username || '',
      picUrl:   data.picUrl || data.profilePicUrl || 'image1.jpeg',
      bio:      data.bio    || '',
    };
    this.g('compose-avatar').src = this.state.profile.picUrl;
  }

  openProfileModal() {
    if (!this.state.signerAddr) { utils.toast('Connect wallet first'); return; }
    this.showProfileView();
    this.g('profile-modal').classList.add('open');
  }

  showProfileView() {
    const p = this.state.profile;
    this.g('pv-avatar').src       = p.picUrl || 'image1.jpeg';
    this.g('pv-name').textContent = p.username || this.trunc(this.state.signerAddr);
    this.g('pv-bio').textContent  = p.bio      || 'No bio yet.';
    this.g('profile-view').style.display = 'block';
    this.g('profile-edit').style.display = 'none';
    this.g('profile-modal-title').textContent = 'Profile';
  }

  showEditForm() {
    const p = this.state.profile;
    this.g('pe-name').value  = p.username || '';
    this.g('pe-pic').value   = (p.picUrl && p.picUrl !== 'image1.jpeg') ? p.picUrl : '';
    this.g('pe-bio').value   = p.bio      || '';
    this.g('pe-preview').src = p.picUrl   || 'image1.jpeg';
    this.g('profile-view').style.display = 'none';
    this.g('profile-edit').style.display = 'block';
    this.g('profile-modal-title').textContent = 'Edit Profile';
  }

  async saveProfile() {
    const username = this.g('pe-name').value.trim();
    let   picUrl   = this.g('pe-pic').value.trim();
    const bio      = this.g('pe-bio').value.trim();

    /* Security: only allow https:// image URLs */
    if (picUrl && !picUrl.startsWith('https://')) {
      utils.toast('Profile picture must be an https:// URL'); return;
    }
    /* Validate the image actually loads */
    if (picUrl) {
      const ok = await new Promise(r => {
        const img = new Image();
        img.onload  = () => r(true);
        img.onerror = () => r(false);
        img.src = picUrl;
      });
      if (!ok) { picUrl = ''; utils.toast('Image URL could not be loaded — using default'); }
    }
    picUrl = picUrl || 'image1.jpeg';

    const data = { username, picUrl, bio };
    this.applyProfile(data);
    await this.cache.saveProfile({ address: this.state.signerAddr, ...data });

    /*
     * Publish on-chain as a self-send.
     * We pass signerAddr as toAddress explicitly — no state.channel mutation,
     * so there is no race condition with the current feed channel.
     */
    const ok = await this.publish(PROFILE_PREFIX + JSON.stringify(data), null, this.state.signerAddr);
    if (ok) {
      this.closeModal('profile-modal');
      this.renderFeed();
      utils.toast('Profile saved on-chain ✓');
    }
  }

  /* ── Fetch pipeline ─────────────────────────────────────────────────── */

  /*
   * Shared raw API call — single source of truth for PulseScan requests.
   *
   * IMPORTANT: uses `offset` (records per page), NOT `limit`.
   * `limit` is silently ignored by the Etherscan-compatible API;
   * `offset` is the correct parameter name per the API spec.
   */
  async apiFetch(address, page) {
    const url = `https://api.scan.pulsechain.com/api?module=account&action=txlist`
              + `&address=${address}&offset=50&page=${page}&sort=desc`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    /* status "0" + "No transactions found" is normal — not an error */
    return (data.status === '1' && Array.isArray(data.result)) ? data.result : [];
  }

  /*
   * Which address to query depends on mode:
   *   inbox / notifications / self → user's own address
   *     (API returns both sent+received; parseTxs filters by mode)
   *   main / custom / wave → the channel address
   */
  queryAddr() {
    const { mode, channel, signerAddr } = this.state;
    return (mode === 'inbox' || mode === 'notifications' || mode === 'self')
      ? signerAddr
      : channel;
  }

  async fetchOnePage(page) {
    const addr = this.queryAddr();
    if (!addr) return [];
    return this.apiFetch(addr, page);
  }

  /*
   * Main fetch loop.
   *
   * Pages of 50 raw txs are fetched sequentially. Each page is parsed
   * immediately. We continue until:
   *   a) POSTS_TARGET new visible posts found, OR
   *   b) last page reached (raw.length < 50), OR
   *   c) MAX_PAGES safety cap hit.
   *
   * Renders incrementally so the user sees results as they arrive.
   * No sleep() delays — we skip pages with no matching posts and keep going.
   * notifications mode always stops after page 1 (recent-only view).
   */
  async fetchPosts(reset = false) {
    if (this.state.loading) return;
    this.state.loading = true;
    if (reset) { this.state.nextPage = 1; this.state.hasMore = true; }
    this.g('loading-more').style.display = 'block';

    let found = 0, pages = 0;
    try {
      while (found < POSTS_TARGET && this.state.hasMore && pages < MAX_PAGES) {
        let raw;
        try { raw = await this.fetchOnePage(this.state.nextPage); }
        catch (err) { utils.toast('Fetch error — ' + err.message); break; }

        this.state.nextPage++;
        pages++;
        this.state.hasMore = raw.length === 50; // < 50 = last page

        const parsed = this.parseTxs(raw);
        if (parsed.length > 0) {
          const known  = new Set(this.state.posts.map(p => p.txHash));
          const unique = parsed.filter(p => !known.has(p.txHash));
          if (unique.length > 0) {
            this.state.posts = [...this.state.posts, ...unique]
              .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            await this.cache.savePosts(unique);
            found += unique.length;
            this.renderFeed(); // show as results arrive
          }
        }

        if (this.state.mode === 'notifications') break; // page 1 only
      }

      if (this.state.posts.length === 0) this.renderFeed(); // show empty state
    } finally {
      this.state.loading = false;
      this.g('loading-more').style.display = 'none';
    }
  }

  /*
   * parseTxs — filter and shape raw API results for the current mode.
   * Each tx is decoded ONCE (no double decoding).
   *
   *   main / custom / wave → TXs where to === channel
   *   inbox                → TXs where from OR to === user
   *                          (direction-tagged 'sent' / 'received')
   *   self                 → TXs where to === user (public channel;
   *                          includes self-sends except PROFILE_DATA)
   *   notifications        → TXs where to === user, newer than lastCheck
   *
   * PROFILE_DATA self-sends are always excluded from the visible feed.
   */
  parseTxs(txs) {
    const { mode, channel, signerAddr } = this.state;
    const lastCheck = parseInt(localStorage.getItem('pulseLastCheck') || '0', 10);

    return txs.reduce((acc, tx) => {
      if (!tx.input || tx.input === '0x') return acc;
      const from = tx.from?.toLowerCase();
      const to   = tx.to?.toLowerCase();

      /* Decode once per tx */
      let raw;
      try { raw = ethers.utils.toUtf8String(tx.input).trim(); }
      catch { return acc; } // non-UTF8 / binary tx — skip silently
      if (!raw) return acc;

      /* Always exclude PROFILE_DATA self-sends from the feed */
      if (raw.startsWith(PROFILE_PREFIX) && from === to) return acc;

      /* Mode-based filtering + direction tagging */
      let direction = null;
      if (mode === 'inbox') {
        if (from !== signerAddr && to !== signerAddr) return acc;
        if (raw.startsWith(PROFILE_PREFIX)) return acc; // no profile saves in inbox
        direction = (from === signerAddr) ? 'sent' : 'received';
      } else if (mode === 'self') {
        /* Public channel — all TXs TO user; self-sends allowed (minus profile saves) */
        if (to !== signerAddr) return acc;
      } else if (mode === 'notifications') {
        /* Only incoming, only newer than last-check */
        if (to !== signerAddr || from === signerAddr) return acc;
        if (Number(tx.timeStamp) * 1000 <= lastCheck) return acc;
      } else {
        /* main / custom / wave — incoming to channel */
        if (to !== channel) return acc;
      }

      /* Parse reply prefix */
      const m       = raw.match(/^REPLY_TO:(0x[a-f0-9]{64})\n\n/i);
      const parentTx = m ? m[1].toLowerCase() : null;
      const display  = m ? raw.slice(m[0].length).trim() : raw;
      if (!display) return acc;

      acc.push({
        content:   raw,
        display,
        parentTx,
        direction,    // null | 'sent' | 'received'
        reporter:  from,
        to:        to ?? null,
        timestamp: tx.timeStamp
          ? new Date(Number(tx.timeStamp) * 1000).toISOString()
          : new Date().toISOString(),
        txHash:    tx.hash.toLowerCase(), // always lowercase for consistent comparison
        channel,
        mode,
      });
      return acc;
    }, []);
  }

  /* ── Polling ─────────────────────────────────────────────────────────── */
  startPolling()  { this.pollTimer = setInterval(() => this.pollNew(), POLL_MS); }
  stopPolling()   { clearInterval(this.pollTimer); }

  async pollNew() {
    if (!this.state.channel || this.state.loading) return;
    const latestTs = this.state.posts[0]
      ? new Date(this.state.posts[0].timestamp)
      : new Date(0);
    try {
      const raw  = await this.fetchOnePage(1);
      /* O(1) lookup sets instead of O(n) Array.some */
      const inFeed    = new Set(this.state.posts.map(p => p.txHash));
      const inPending = new Set(this.state.pending.map(p => p.txHash));
      const fresh = this.parseTxs(raw).filter(p =>
        new Date(p.timestamp) > latestTs &&
        !inFeed.has(p.txHash) &&
        !inPending.has(p.txHash)
      );
      if (fresh.length) {
        this.state.pending = [...fresh, ...this.state.pending];
        const n   = this.state.pending.length;
        const btn = this.g('new-banner');
        btn.textContent   = `✦ ${n} new post${n > 1 ? 's' : ''} — click to load`;
        btn.style.display = 'block';
      }
      /* Re-check notification badge on each poll */
      if (this.state.signerAddr) this.checkNotifBadge();
    } catch (err) { console.warn('Poll error', err); }
  }

  loadPending() {
    this.state.posts   = [...this.state.pending, ...this.state.posts];
    this.state.pending = [];
    this.g('new-banner').style.display = 'none';
    this.renderFeed();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async refreshFeed() {
    const btn = this.g('refresh-btn');
    btn.textContent       = '↻ Refreshing…';
    this.state.posts      = [];
    this.state.pending    = [];
    this.state.nextPage   = 1;
    this.state.hasMore    = true;
    this.g('new-banner').style.display = 'none';
    await this.fetchPosts(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    btn.textContent = '↺ Refresh';
  }

  async resetAndFetch() {
    this.stopPolling();
    this.state.posts    = [];
    this.state.pending  = [];
    this.state.nextPage = 1;
    this.state.hasMore  = true;
    this.state.expanded.clear();
    this.g('new-banner').style.display = 'none';
    await this.loadCached();
    await this.fetchPosts(true);
    /* Notifications are a point-in-time snapshot — no ongoing poll */
    if (this.state.mode !== 'notifications') this.startPolling();
  }

  /* ── Cache helpers ───────────────────────────────────────────────────── */
  async loadCached() {
    const { mode, channel, signerAddr } = this.state;
    const posts = await this.cache.getPosts(p => {
      if (mode === 'notifications') return false; // always live
      if (mode === 'inbox') return p.mode === 'inbox'  && p.channel === signerAddr;
      if (mode === 'self')  return p.mode === 'self'   && p.channel === signerAddr;
      if (mode === 'wave')  return p.mode === 'wave'   && p.channel === channel;
      return p.channel === channel && p.mode === mode;
    });
    this.state.posts = posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    this.renderFeed();
  }

  /* ── Render ──────────────────────────────────────────────────────────── */
  renderFeed() {
    const feed = this.g('feed');
    const term = this.state.searchTerm;
    const list = term
      ? this.state.posts.filter(p =>
          p.display.toLowerCase().includes(term) ||
          p.reporter.toLowerCase().includes(term)
        )
      : this.state.posts;

    if (!list.length) {
      const msgs = {
        notifications: 'No new notifications',
        inbox:         'No messages yet',
        self:          'No posts to your channel yet',
        wave:          'No Wave transmissions yet',
      };
      feed.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📡</span>
          <h3>${this.state.loading
            ? 'Scanning the chain…'
            : (msgs[this.state.mode] || 'Nothing here yet')}</h3>
          <p style="font-size:14px;margin-top:4px">${this.state.loading
            ? `Scanned ${this.state.nextPage - 1} page(s) so far`
            : 'Be the first to post in this channel'}</p>
        </div>`;
      return;
    }

    const frag = document.createDocumentFragment();
    list.forEach(post => {
      const el = document.createElement('div');
      el.className      = 'post-item';
      el.dataset.txhash = post.txHash;
      el.innerHTML      = this.postHTML(post, false);
      frag.appendChild(el);
      /* Lazy-load other users' profiles (non-blocking, won't re-fetch if cached) */
      if (post.reporter !== this.state.signerAddr) this.fetchOtherProfile(post.reporter);
    });
    feed.innerHTML = '';
    feed.appendChild(frag);
  }

  /*
   * Build inner HTML for a post card.
   * ALL blockchain-sourced text goes through utils.safe() — XSS-safe.
   * inModal = true → always show full text, no read-more truncation.
   */
  postHTML(post, inModal) {
    const isOwn    = post.reporter === this.state.signerAddr;
    const expanded = this.state.expanded.has(post.txHash);

    /* Profile resolution */
    let picUrl, displayName;
    if (isOwn) {
      picUrl      = this.state.profile.picUrl || 'image1.jpeg';
      displayName = this.state.profile.username
        ? utils.safe(this.state.profile.username)
        : this.trunc(post.reporter);
    } else {
      const c = this.state.profCache[post.reporter];
      picUrl      = c?.picUrl || 'image1.jpeg';
      displayName = c?.username ? utils.safe(c.username) : this.trunc(post.reporter);
    }

    /* Body — XSS-safe */
    const safeText  = utils.safe(post.display);
    const needsMore = !inModal && !expanded && post.display.length > MAX_PREVIEW;
    const bodyHtml  = needsMore
      ? utils.safe(post.display.slice(0, MAX_PREVIEW)).replace(/\n/g, '<br>')
        + '<span style="color:var(--muted)">…</span>'
      : safeText.replace(/\n/g, '<br>');

    /* Direction badge (inbox only) */
    const dirBadge = post.direction
      ? `<span class="dir-badge dir-${post.direction}">${post.direction === 'sent' ? '↑ sent' : '↓ received'}</span>`
      : '';

    /* "To:" label on sent inbox posts */
    const toLabel = (post.direction === 'sent' && post.to)
      ? `<span class="to-label">To: ${this.trunc(post.to)}</span>`
      : '';

    const replyBadge = post.parentTx
      ? `<span class="reply-badge">↳ Replying to ${this.trunc(post.parentTx)}</span>`
      : '';

    return `
      <div class="post-hdr">
        <img src="${utils.safe(picUrl)}" class="post-avatar" alt=""
          onerror="this.src='image1.jpeg'">
        <div class="post-meta">
          <div>
            <span class="post-name">${displayName}</span>
            <span class="post-handle">@${this.trunc(post.reporter)}</span>
            ${dirBadge}
          </div>
          <div class="post-time">${this.relTime(post.timestamp)}</div>
        </div>
      </div>
      ${toLabel}${replyBadge}
      <div class="post-body">${bodyHtml}</div>
      ${needsMore ? `<button class="read-more-btn" data-action="expand">Read more ↓</button>` : ''}
      <div class="post-actions">
        <button class="act-btn" data-action="reply">💬 Reply</button>
        <a href="https://otter.pulsechain.com/tx/${post.txHash}"
          target="_blank" class="otter-link"
          onclick="event.stopPropagation()">View on OtterScan →</a>
      </div>`;
  }

  /* ── Publish ─────────────────────────────────────────────────────────── */

  /*
   * Core publish.
   * toAddress defaults to state.channel (the current feed's target).
   * Profile saves pass signerAddr explicitly so state.channel is never mutated
   * (fixes the original's race condition).
   */
  async publish(content, parentTx = null, toAddress = null) {
    if (!this.signer)      { utils.toast('Connect wallet first'); return false; }
    if (!content?.trim())  { utils.toast('Message cannot be empty'); return false; }

    let body = content.trim();
    if (parentTx) body = `${REPLY_PREFIX}${parentTx}\n\n${body}`;

    const to = toAddress || this.state.channel;
    utils.loading(true, 'Publishing…');

    try {
      const bytes   = ethers.utils.toUtf8Bytes(body);
      const data    = ethers.utils.hexlify(bytes);
      const txReq   = { to, value: '0', data };
      let   gas     = await this.signer.estimateGas(txReq);
      gas           = gas.mul(130).div(100); // +30% buffer
      const tx      = await this.signer.sendTransaction({ ...txReq, gasLimit: gas });
      const receipt = await tx.wait();
      const hash    = receipt.transactionHash.toLowerCase();

      if (!body.startsWith(PROFILE_PREFIX)) {
        const post = {
          content:   body,
          display:   content.trim(),
          parentTx,
          direction: null,
          reporter:  this.state.signerAddr,
          to:        to.toLowerCase(),
          timestamp: new Date().toISOString(),
          txHash:    hash,
          channel:   this.state.channel,
          mode:      this.state.mode,
        };
        this.state.posts.unshift(post);
        await this.cache.savePosts([post]);
        this.renderFeed();
      }

      utils.toast(`Published ✓  ${this.trunc(hash)}`);
      return true;
    } catch (err) {
      utils.toast('Failed: ' + (err.reason || err.message || 'Unknown error'));
      return false;
    } finally {
      utils.loading(false);
    }
  }

  async publishPost() {
    const text = this.g('compose-text').value.trim();
    if (!text) return;
    const ok = await this.publish(text);
    if (ok) {
      this.g('compose-text').value    = '';
      this.g('char-count').textContent = '0 / ∞';
    }
  }

  /* ── Reply ───────────────────────────────────────────────────────────── */
  openReplyModal(post) {
    this.state.replyTarget = post;
    const preview = post.display.length > 100 ? post.display.slice(0, 100) + '…' : post.display;
    this.g('reply-quote').textContent = `↳ ${this.trunc(post.reporter)}: "${preview}"`;
    this.g('reply-input').value       = '';
    this.g('reply-count').textContent = '0 / ∞';
    this.g('reply-modal').classList.add('open');
    this.g('reply-input').focus();
  }

  async postReply() {
    const text = this.g('reply-input').value.trim();
    if (!text || !this.state.replyTarget) return;
    /* Send reply to the same address the original post was sent to,
       not state.channel — this matters in inbox/self/notifications modes */
    const ok = await this.publish(text, this.state.replyTarget.txHash, this.state.replyTarget.to);
    if (ok) { this.closeModal('reply-modal'); this.g('reply-input').value = ''; }
  }

  /* ── Thread ──────────────────────────────────────────────────────────── */
  openThread(post) {
    this.state.threadPost = post;

    const origEl = document.createElement('div');
    origEl.className      = 'post-item';
    origEl.dataset.txhash = post.txHash;
    origEl.innerHTML      = this.postHTML(post, true);
    origEl.style.cssText  = 'border:none;cursor:default';
    this.g('thread-orig').replaceChildren(origEl);

    const replies = this.state.posts
      .filter(p => p.parentTx === post.txHash)
      .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

    const rc = this.g('thread-replies');
    if (replies.length) {
      rc.innerHTML = '';
      replies.forEach(r => {
        const el = document.createElement('div');
        el.className      = 'post-item thread-reply-item';
        el.dataset.txhash = r.txHash;
        el.innerHTML      = this.postHTML(r, true);
        rc.appendChild(el);
      });
    } else {
      rc.innerHTML = `<p style="color:var(--muted);font-size:14px;padding:16px 0;text-align:center">
        No replies yet — be the first!</p>`;
    }

    this.g('thread-reply-input').value    = '';
    this.g('thread-count').textContent    = '0 / ∞';
    this.g('thread-modal').classList.add('open');
  }

  async postThreadReply() {
    const text = this.g('thread-reply-input').value.trim();
    if (!text || !this.state.threadPost) return;
    /* Reply to the same channel as the original post */
    const ok = await this.publish(text, this.state.threadPost.txHash, this.state.threadPost.to);
    if (ok) {
      this.g('thread-reply-input').value = '';
      this.openThread(this.state.threadPost); // refresh reply list
    }
  }

  closeModal(id) { this.g(id).classList.remove('open'); }

  /* ── Infinite scroll ─────────────────────────────────────────────────── */
  onScroll() {
    if (this.state.mode === 'notifications') return; // snapshot — no pagination
    if (this.state.hasMore && !this.state.loading) {
      const near = window.innerHeight + window.scrollY >= document.body.offsetHeight - 400;
      if (near) this.fetchPosts(false);
    }
  }

  /* ── Helpers ─────────────────────────────────────────────────────────── */
  trunc = a => (a && a.length > 10) ? `${a.slice(0,6)}...${a.slice(-4)}` : (a || '');

  relTime = ts => {
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60)    return 'just now';
    if (s < 3600)  return `${Math.floor(s / 60)}m`;
    if (s < 86400) return `${Math.floor(s / 3600)}h`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
}

/* ── Boot ─────────────────────────────────────────────────────────────── */
const pulse = new PulseUnderground();
pulse.init().catch(err => {
  console.error('Init error:', err);
  utils.toast('Startup failed — see console');
});
</script>
