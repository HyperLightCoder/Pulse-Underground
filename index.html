<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Underground</title>
<link rel="icon" type="image/jpeg" href="image1.jpeg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
:root{--primary:#7c4dff;--primary-light:#b388ff;--bg-dark:#0d0b14;--bg-light:#13101c;--bg-lighter:#1a1327;--border:#2a2438;--text:#fff;--neon-glow:0 0 5px var(--primary),0 0 10px var(--primary),0 0 15px var(--primary);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg-dark);color:var(--text);line-height:1.5;font-size:16px}
#app-container{display:flex;min-height:100vh;max-width:1280px;margin:0 auto}
#sidebar-left,#sidebar-right{position:sticky;top:0;height:100vh;background:var(--bg-light);padding:20px;overflow-y:auto}
#sidebar-left{width:250px;border-right:1px solid var(--border)}
#sidebar-right{width:300px;border-left:1px solid var(--border)}
.logo{display:block;margin:0 auto 20px;width:100px}
h1{font-size:24px;color:var(--primary-light);text-align:center;margin-bottom:20px}
nav ul{list-style:none}
nav ul li{margin-bottom:10px}
nav a{display:flex;align-items:center;color:var(--text);text-decoration:none;padding:10px;border-radius:8px;transition:background .2s,box-shadow .2s}
nav a:hover{background:var(--bg-lighter);box-shadow:var(--neon-glow)}
main{flex-grow:1;width:calc(1280px - 550px);background:var(--bg-light);border:1px solid var(--border);padding:20px}
button{width:100%;padding:12px;background:linear-gradient(45deg,var(--primary),var(--primary-light));color:var(--text);border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:all .3s;margin-bottom:15px}
button:hover{box-shadow:var(--neon-glow)}
button:disabled{opacity:.6;cursor:not-allowed}
#publishStory{position:absolute;bottom:10px;right:10px;width:40px;height:40px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center}
#newStoriesButton{display:none;position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:999;padding:10px;background:var(--primary);border:none;color:var(--text);border-radius:20px;cursor:pointer}
#storySubmission{display:flex;padding:15px;background:var(--bg-lighter);border-bottom:1px solid var(--border);margin-bottom:20px}
.avatar{width:48px;height:48px;border-radius:50%;margin-right:15px}
.input-container{flex-grow:1;position:relative}
textarea{width:100%;min-height:100px;padding:15px;background:var(--bg-light);border:1px solid var(--border);border-radius:8px;color:var(--text);resize:none}
textarea:focus{outline:none;border-color:var(--primary);box-shadow:var(--neon-glow)}
.news-item{padding:15px;border-bottom:1px solid var(--border);transition:background .2s}
.news-item:hover{background:var(--bg-lighter)}
.reporter-info{display:flex;align-items:center;margin-bottom:10px}
.reporter-details{font-size:14px;margin-left:10px}
.reporter-name{font-weight:bold}
.report-content{margin:10px 0;line-height:1.6}
#searchInput,#customChannelInput{width:100%;padding:12px 15px;background:var(--bg-lighter);border:1px solid var(--border);border-radius:20px;color:var(--text);margin-bottom:20px}
#loadingOverlay,#profileModal,#replyModal,#threadModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,11,20,.9);color:var(--text);display:none;justify-content:center;align-items:center;z-index:1000}
#statusMessage{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-light);padding:10px 20px;border-radius:5px;display:none;z-index:1001;box-shadow:var(--neon-glow)}
.modal-content{background:var(--bg-light);padding:20px;border-radius:8px;width:380px;max-width:90%;border:1px solid var(--border)}
.thread-modal-content{background:var(--bg-light);padding:24px;border-radius:12px;width:90%;max-width:620px;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
#profileHeader{background:var(--bg-lighter);padding:20px;border-radius:12px;margin-bottom:20px;text-align:center;position:relative;}
#profileHeader .avatar{width:120px;height:120px;border-radius:50%;margin:0 auto 15px;display:block;}
#profileHeader h2{margin:10px 0 5px;font-size:24px;}
#profileHeader .bio{font-size:15px;color:#bbb;max-width:600px;margin:0 auto;}
#profileHeader .edit-btn{position:absolute;top:15px;right:15px;padding:4px 10px;font-size:12px;background:var(--primary);color:#fff;border:none;border-radius:9999px;cursor:pointer;}
</style>
</head>
<body>
<div id="app-container">
  <div id="sidebar-left">
    <img src="image1.jpeg" alt="Pulse Underground Logo" class="logo">
    <nav>
      <ul>
        <li><a href="#" id="homeLink"><span class="icon">🏠</span>Home</a></li>
        <li><a href="#"><span class="icon">🔎</span>Explore</a></li>
        <li><a href="#"><span class="icon">🛎️</span>Notifications</a></li>
        <li><a href="#"><span class="icon">✉️</span>Messages</a></li>
        <li><a href="#" id="profileLink"><span class="icon">👤</span>Profile</a></li>
      </ul>
    </nav>
    <button id="connectWallet">Connect Wallet</button>
    <div id="walletInfo" style="display:none"><p>Connected: <span id="walletAddress"></span></p></div>
  </div>
  <main>
    <button id="newStoriesButton">New stories available</button>
    <h1 id="mainTitle">The Pulse Underground</h1>
    <div id="storySubmission">
      <img src="image1.jpeg" alt="User Avatar" class="avatar" id="submissionAvatar">
      <div class="input-container">
        <textarea id="reportContent" placeholder="What's happening?"></textarea>
        <button id="publishStory">➤</button>
      </div>
    </div>
    <div id="profileHeader" style="display:none">
      <img id="profileHeaderAvatar" src="image1.jpeg" class="avatar">
      <h2 id="profileHeaderName">Username</h2>
      <div id="profileHeaderBio" class="bio">Bio goes here...</div>
      <button onclick="pulse.openProfileEditModal()" class="edit-btn">Edit</button>
    </div>
    <div id="newsFeed"></div>
    <button id="refreshButton">Refresh</button>
  </main>
  <div id="sidebar-right">
    <input type="text" id="searchInput" placeholder="Search The Pulse Underground">
    <div id="channelSelection">
      <h3>Channels</h3>
      <button id="mainChannel">Main Channel</button>
      <button id="selfChannel">Self Channel</button>
      <input type="text" id="customChannelInput" placeholder="Enter custom address">
      <button id="setCustomChannel">Set Custom Channel</button>
      <p>Current Channel: <span id="currentChannel"></span></p>
    </div>
  </div>
</div>

<div id="loadingOverlay">Loading...</div>
<div id="statusMessage"></div>

<div id="profileModal">
  <div class="modal-content">
    <h2>Edit Profile</h2>
    <img src="image1.jpeg" alt="Profile Preview" id="profilePicPreview" style="width:100px;height:100px;border-radius:50%;margin:0 auto 15px;display:block">
    <label for="usernameInput">Username:</label>
    <input type="text" id="usernameInput" placeholder="Enter username">
    <label for="profilePicInput">Profile Picture URL:</label>
    <input type="text" id="profilePicInput" placeholder="Enter image URL">
    <label for="bioInput">Bio:</label>
    <textarea id="bioInput" placeholder="Write a short bio..." style="width:100%;min-height:80px;padding:10px;background:var(--bg-lighter);border:1px solid var(--border);border-radius:5px;color:var(--text);resize:none"></textarea>
    <div class="modal-buttons">
      <button id="saveProfile">Save Profile (on-chain)</button>
      <button id="clearProfile">Clear</button>
      <button id="closeProfileModal">Close</button>
    </div>
  </div>
</div>

<div id="replyModal">
  <div class="modal-content" style="width:480px">
    <h2 id="replyHeader" style="margin-bottom:15px">Reply</h2>
    <div id="replyingTo" style="margin-bottom:15px;color:var(--primary-light);font-size:15px"></div>
    <textarea id="replyContent" style="width:100%;min-height:140px;padding:15px;background:var(--bg-light);border:1px solid var(--border);border-radius:8px;color:var(--text);resize:none;font-size:17px" placeholder="Write your reply..."></textarea>
    <div style="text-align:right;margin-top:10px;font-size:14px;color:#888" id="replyCharCount">0 / ∞</div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button id="cancelReply">Cancel</button>
      <button id="postReply" style="background:linear-gradient(45deg,#00ff9d,#00cc7a)">Post Reply</button>
    </div>
  </div>
</div>

<div id="threadModal">
  <div class="thread-modal-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:15px">
      <h2 style="margin:0">Thread</h2>
      <button id="closeThreadModal" style="background:transparent;border:none;color:var(--primary-light);font-size:24px;cursor:pointer">✕</button>
    </div>
    <div id="threadOriginal" style="margin-bottom:30px"></div>
    <h3 style="margin-bottom:15px">Replies</h3>
    <div id="threadReplies"></div>
    <div style="margin-top:40px;padding:20px;background:var(--bg-lighter);border-radius:12px">
      <textarea id="threadReplyContent" placeholder="Reply to this thread..." style="width:100%;min-height:110px;padding:15px;background:var(--bg-light);border:1px solid var(--border);border-radius:8px;color:var(--text);resize:none;font-size:17px"></textarea>
      <button id="postThreadReply" style="margin-top:12px;width:100%">Post Reply to Thread</button>
    </div>
  </div>
</div>

<script>
const ethers = window.ethers;
const MAIN_CHANNEL = "0x9cd83be15a79646a3d22b81fc8ddf7b7240a62cb";
const PULSE_CHAIN_ID = 369;
const REPLY_PREFIX = "REPLY_TO:";
const PROFILE_PREFIX = "PROFILE_DATA:";

const utils = {
  showStatus: (m, d = 3000) => {
    const s = document.getElementById("statusMessage");
    s.textContent = m;
    s.style.display = "block";
    setTimeout(() => s.style.display = "none", d);
  },
  toggleLoading: s => document.getElementById("loadingOverlay").style.display = s ? "flex" : "none"
};

class Cache {
  constructor(){this.db=null;this.initDB()}
  initDB(){const r=indexedDB.open("PulseUndergroundCache",2);r.onupgradeneeded=e=>{const d=e.target.result;d.objectStoreNames.contains("newsItems")||d.createObjectStore("newsItems",{keyPath:"txHash"});d.objectStoreNames.contains("profiles")||d.createObjectStore("profiles",{keyPath:"address"})};r.onsuccess=()=>{this.db=r.result};r.onerror=()=>utils.showStatus("IndexedDB Error")}
  async waitForDB(){this.db||await new Promise(r=>setTimeout(r,100))}
  async getItems(){await this.waitForDB();return new Promise((r,e)=>{const t=this.db.transaction("newsItems","readonly").objectStore("newsItems").getAll();t.onsuccess=()=>r(t.result||[]);t.onerror=()=>e(t.error)})}
  async saveItems(i){await this.waitForDB();const t=this.db.transaction("newsItems","readwrite"),s=t.objectStore("newsItems");i.forEach(x=>s.put(x));return new Promise((r,e)=>{t.oncomplete=r;t.onerror=()=>e(t.error)})}
  async getProfile(a){await this.waitForDB();return new Promise((r,e)=>{const t=this.db.transaction("profiles","readonly").objectStore("profiles").get(a);t.onsuccess=()=>r(t.result);t.onerror=()=>e(t.error)})}
  async saveProfile(p){await this.waitForDB();const t=this.db.transaction("profiles","readwrite").objectStore("profiles");t.put(p);return new Promise((r,e)=>{t.oncomplete=r;t.onerror=()=>e(t.error)})}
  async clearProfile(a){await this.waitForDB();const t=this.db.transaction("profiles","readwrite").objectStore("profiles");t.delete(a);return new Promise((r,e)=>{t.oncomplete=r;t.onerror=()=>e(t.error)})}
}

class PulseUnderground {
  constructor() {
    this.state = {newsItems:[], pendingNewItems:[], searchTerm:"", isLoading:false, hasMore:true, nextPageParams:null, channel:MAIN_CHANNEL, profile:{username:"", profilePicUrl:"image1.jpeg", bio:""}, signerAddress:null, replyingTo:null, currentThreadPost:null, isProfileView:false};
    this.elements = {
      newsFeed:document.getElementById("newsFeed"),
      reportContent:document.getElementById("reportContent"),
      searchInput:document.getElementById("searchInput"),
      refreshButton:document.getElementById("refreshButton"),
      newStoriesButton:document.getElementById("newStoriesButton"),
      connectWallet:document.getElementById("connectWallet"),
      walletInfo:document.getElementById("walletInfo"),
      walletAddress:document.getElementById("walletAddress"),
      publishStory:document.getElementById("publishStory"),
      mainChannel:document.getElementById("mainChannel"),
      selfChannel:document.getElementById("selfChannel"),
      customChannelInput:document.getElementById("customChannelInput"),
      setCustomChannel:document.getElementById("setCustomChannel"),
      currentChannel:document.getElementById("currentChannel"),
      submissionAvatar:document.getElementById("submissionAvatar"),
      profileLink:document.getElementById("profileLink"),
      profileModal:document.getElementById("profileModal"),
      usernameInput:document.getElementById("usernameInput"),
      profilePicInput:document.getElementById("profilePicInput"),
      profilePicPreview:document.getElementById("profilePicPreview"),
      saveProfile:document.getElementById("saveProfile"),
      clearProfile:document.getElementById("clearProfile"),
      closeProfileModal:document.getElementById("closeProfileModal"),
      homeLink:document.getElementById("homeLink"),
      replyModal:document.getElementById("replyModal"),
      replyHeader:document.getElementById("replyHeader"),
      replyingTo:document.getElementById("replyingTo"),
      replyContent:document.getElementById("replyContent"),
      replyCharCount:document.getElementById("replyCharCount"),
      cancelReply:document.getElementById("cancelReply"),
      postReply:document.getElementById("postReply"),
      threadModal:document.getElementById("threadModal"),
      threadOriginal:document.getElementById("threadOriginal"),
      threadReplies:document.getElementById("threadReplies"),
      threadReplyContent:document.getElementById("threadReplyContent"),
      postThreadReply:document.getElementById("postThreadReply"),
      closeThreadModal:document.getElementById("closeThreadModal"),
      profileHeader:document.getElementById("profileHeader"),
      profileHeaderAvatar:document.getElementById("profileHeaderAvatar"),
      profileHeaderName:document.getElementById("profileHeaderName"),
      profileHeaderBio:document.getElementById("profileHeaderBio"),
      bioInput:document.getElementById("bioInput"),
      mainTitle:document.getElementById("mainTitle"),
      storySubmission:document.getElementById("storySubmission")
    };
    this.cache = new Cache();
    this.signer = null;
    this.pollInterval = null;
    this.init();
  }

  async init() {
    await this.loadCachedData();
    this.setupListeners();
    this.elements.currentChannel.textContent = this.truncAddr(this.state.channel);
    this.tryAutoReconnectWallet();
    await this.fetchPosts();
    this.startPolling();
  }

  truncAddr = (a) => a && a.length > 10 ? `${a.slice(0,6)}...${a.slice(-4)}` : a;
  relativeTime = (timestamp) => {
    const diff = Math.floor((Date.now() - new Date(timestamp)) / 1000);
    if (diff < 60) return "just now";
    if (diff < 3600) return `${Math.floor(diff/60)}m`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h`;
    return new Date(timestamp).toLocaleDateString("en-US", {month:"short", day:"numeric"});
  };

  getPostHTML = (post, isThreadHeader = false) => {
    const isOwn = post.reporter === this.state.signerAddress;
    const displayContent = post.displayContent || post.content || "";
    const parentIndicator = post.parentTx ? `<div style="color:var(--primary-light);font-size:14px;margin-bottom:8px">↳ Replying to ${this.truncAddr(post.parentTx)}</div>` : "";
    return `
      <div class="reporter-info">
        <img src="${isOwn && this.state.profile.profilePicUrl ? this.state.profile.profilePicUrl : "image1.jpeg"}" class="avatar">
        <div class="reporter-details">
          <span class="reporter-name">${isOwn && this.state.profile.username ? this.state.profile.username : this.truncAddr(post.reporter)}</span>
          <span style="margin-left:8px;color:#888">@${this.truncAddr(post.reporter)}</span>
          <span style="margin-left:8px;color:#888">· ${this.relativeTime(post.timestamp)}</span>
        </div>
      </div>
      ${parentIndicator}
      <div class="report-content" style="${isThreadHeader ? "font-size:19px;line-height:1.7" : ""}">${displayContent.replace(/\n/g, "<br>")}</div>
      <a href="https://scan.pulsechain.com/tx/${post.txHash}" target="_blank" class="tx-link" onclick="event.stopImmediatePropagation()">View on PulseScan →</a>
      ${!isThreadHeader ? `<button onclick="event.stopImmediatePropagation(); pulse.openReplyModal({reporter:'${post.reporter}', txHash:'${post.txHash}', parentTx:'${post.parentTx||''}'});" style="margin-top:8px;padding:6px 16px;font-size:14px;background:transparent;border:1px solid var(--primary);color:var(--primary);border-radius:9999px;cursor:pointer">Reply</button>` : ""}
    `;
  };

  setupListeners = () => {
    const e = this.elements;
    e.connectWallet.onclick = () => this.toggleWallet();
    e.publishStory.onclick = () => this.publishStory();
    e.searchInput.oninput = this.debounce(() => {this.state.searchTerm = e.searchInput.value.trim().toLowerCase(); this.renderNewsFeed();}, 300);
    e.refreshButton.onclick = () => this.refreshPosts();
    e.newStoriesButton.onclick = () => this.loadNewStories();
    window.addEventListener("scroll", this.debounce(() => this.checkInfiniteScroll(), 200));
    e.homeLink.onclick = (ev) => {ev.preventDefault(); window.scrollTo({top:0, behavior:"smooth"});};
    e.mainChannel.onclick = () => this.setChannel(MAIN_CHANNEL);
    e.selfChannel.onclick = async () => {if(!this.signer) return utils.showStatus("Connect wallet first"); this.setChannel((await this.signer.getAddress()).toLowerCase());};
    e.setCustomChannel.onclick = () => {const a = e.customChannelInput.value.trim().toLowerCase(); ethers.utils.isAddress(a) ? this.setChannel(a) : utils.showStatus("Invalid address");};
    e.profileLink.onclick = (ev) => {ev.preventDefault(); if(!this.signer) return utils.showStatus("Connect wallet first"); this.setProfileView();};
    e.saveProfile.onclick = () => this.saveProfile();
    e.clearProfile.onclick = () => this.clearProfile();
    e.closeProfileModal.onclick = () => e.profileModal.style.display = "none";
    e.profilePicInput.oninput = () => this.previewProfilePic();
    e.cancelReply.onclick = () => e.replyModal.style.display = "none";
    e.postReply.onclick = () => this.postReplyFromModal();
    e.replyContent.oninput = () => {e.replyCharCount.textContent = `${e.replyContent.value.length} / ∞`;};
    e.closeThreadModal.onclick = () => e.threadModal.style.display = "none";
    e.postThreadReply.onclick = () => this.postThreadReply();
  };

  async tryAutoReconnectWallet() {
    if (!window.ethereum) return;
    try {
      const p = new ethers.providers.Web3Provider(window.ethereum);
      const accounts = await p.listAccounts();
      if (accounts.length > 0 && localStorage.getItem("pulseWalletConnected") === "true") {
        this.signer = p.getSigner();
        this.state.signerAddress = (await this.signer.getAddress()).toLowerCase();
        this.elements.walletAddress.textContent = this.truncAddr(this.state.signerAddress);
        this.elements.walletInfo.style.display = "block";
        this.elements.connectWallet.textContent = "Disconnect Wallet";
        await this.loadProfile();
      }
    } catch(e) {}
  }

  async toggleWallet() { this.signer ? await this.disconnectWallet() : await this.connectWallet(); }

  async connectWallet() {
    if(!window.ethereum) return utils.showStatus("MetaMask not detected");
    try {
      const p = new ethers.providers.Web3Provider(window.ethereum);
      if((await p.getNetwork()).chainId !== PULSE_CHAIN_ID) await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x171"}]});
      await p.send("eth_requestAccounts",[]);
      this.signer = p.getSigner();
      this.state.signerAddress = (await this.signer.getAddress()).toLowerCase();
      this.elements.walletAddress.textContent = this.truncAddr(this.state.signerAddress);
      this.elements.walletInfo.style.display = "block";
      this.elements.connectWallet.textContent = "Disconnect Wallet";
      localStorage.setItem("pulseWalletConnected", "true");
      await this.loadProfile();
      utils.showStatus("Wallet connected");
    } catch(e) { utils.showStatus("Connection failed: " + e.message); }
  }

  async disconnectWallet() {
    this.signer = null;
    this.state.signerAddress = null;
    this.state.profile = {username:"", profilePicUrl:"image1.jpeg", bio:""};
    this.elements.walletInfo.style.display = "none";
    this.elements.connectWallet.textContent = "Connect Wallet";
    localStorage.removeItem("pulseWalletConnected");
    this.renderNewsFeed();
    utils.showStatus("Wallet disconnected");
  }

  async setChannel(a) {
    this.state.isProfileView = false;
    this.stopPolling();
    this.state.channel = a.toLowerCase();
    this.state.nextPageParams = null;
    this.state.hasMore = true;
    this.state.pendingNewItems = [];
    this.elements.newStoriesButton.style.display = "none";
    this.elements.profileHeader.style.display = "none";
    this.elements.storySubmission.style.display = "flex";
    this.elements.mainTitle.style.display = "block";
    const i = await this.cache.getItems();
    this.state.newsItems = i.filter(x => x.channel === this.state.channel).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    this.renderNewsFeed();
    this.elements.currentChannel.textContent = this.truncAddr(a);
    await this.fetchPosts();
    this.startPolling();
  }

  async setProfileView() {
    if (!this.signer) return utils.showStatus("Connect wallet first");
    this.state.isProfileView = true;
    this.stopPolling();
    this.state.channel = this.state.signerAddress;
    this.state.nextPageParams = null;
    this.state.hasMore = true;
    this.state.pendingNewItems = [];
    this.elements.newStoriesButton.style.display = "none";
    this.elements.storySubmission.style.display = "none";
    this.elements.mainTitle.style.display = "none";
    this.elements.profileHeader.style.display = "block";
    const i = await this.cache.getItems();
    this.state.newsItems = i.filter(x => x.reporter === this.state.signerAddress).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    await this.loadOnChainProfile();
    this.renderNewsFeed();
    await this.fetchProfilePosts();
    this.startPolling();
  }

  async loadOnChainProfile() {
    if (!this.state.signerAddress) return;
    try {
      const url = `https://api.scan.pulsechain.com/api?module=account&action=txlist&address=${this.state.signerAddress}&limit=50`;
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        if (d.status === "1" && d.result) {
          const profileTx = d.result.find(tx => {
            try {
              const txt = ethers.utils.toUtf8String(tx.input || "0x").trim();
              return txt.startsWith(PROFILE_PREFIX);
            } catch { return false; }
          });
          if (profileTx) {
            const raw = ethers.utils.toUtf8String(profileTx.input).trim();
            const jsonStr = raw.substring(PROFILE_PREFIX.length).trim();
            const data = JSON.parse(jsonStr);
            this.state.profile = {...this.state.profile, ...data};
            await this.cache.saveProfile({address:this.state.signerAddress, ...this.state.profile});
          }
        }
      }
    } catch(e) {}
    this.updateProfileHeader();
  }

  updateProfileHeader() {
    const p = this.state.profile;
    this.elements.profileHeaderAvatar.src = p.profilePicUrl || "image1.jpeg";
    this.elements.profileHeaderName.textContent = p.username || this.truncAddr(this.state.signerAddress);
    this.elements.profileHeaderBio.textContent = p.bio || "No bio yet...";
  }

  openProfileEditModal = () => {
    const p = this.state.profile;
    this.elements.usernameInput.value = p.username || "";
    this.elements.profilePicInput.value = p.profilePicUrl !== "image1.jpeg" ? p.profilePicUrl : "";
    this.elements.bioInput.value = p.bio || "";
    this.elements.profileModal.style.display = "flex";
  };

  async fetchProfilePosts() {
    if (!this.state.signerAddress) return;
    try {
      const url = `https://api.scan.pulsechain.com/api?module=account&action=txlist&address=${this.state.signerAddress}&limit=50`;
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        if (d.status === "1" && d.result) {
          const parsed = this.parseTransactions(d.result);
          const outgoing = parsed.filter(item => item.reporter === this.state.signerAddress);
          const newOnes = outgoing.filter(o => !this.state.newsItems.some(x => x.txHash === o.txHash));
          if (newOnes.length) {
            this.state.newsItems = [...newOnes, ...this.state.newsItems].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            await this.cache.saveItems(newOnes);
          }
        }
      }
      this.renderNewsFeed();
    } catch(e) {}
  }

  async saveProfile() {
    const n = this.elements.usernameInput.value.trim();
    let u = this.elements.profilePicInput.value.trim() || "image1.jpeg";
    const bio = this.elements.bioInput.value.trim();
    if (u !== "image1.jpeg") {
      const i = new Image(); i.src = u;
      if (!await new Promise(r => {i.onload = () => r(true); i.onerror = () => r(false);})) {
        utils.showStatus("Invalid profile picture URL - using default");
        u = "image1.jpeg";
      }
    }
    this.state.profile = {username:n, profilePicUrl:u, bio};
    await this.cache.saveProfile({address:this.state.signerAddress, ...this.state.profile});
    if (this.signer) {
      const profileData = JSON.stringify({username:n, profilePicUrl:u, bio});
      const finalContent = `${PROFILE_PREFIX}${profileData}`;
      const oldChannel = this.state.channel;
      this.state.channel = this.state.signerAddress;
      await this.doPublish(finalContent);
      this.state.channel = oldChannel;
    }
    this.elements.profileModal.style.display = "none";
    this.updateProfileHeader();
    this.renderNewsFeed();
    utils.showStatus("Profile saved on-chain");
  }

  async doPublish(userContent, parentTx = null) {
    if(!this.signer) return utils.showStatus("Connect wallet first");
    if(!userContent) return;
    let finalContent = userContent;
    if(parentTx) finalContent = `${REPLY_PREFIX}${parentTx}\n\n${userContent}`;
    utils.toggleLoading(true);
    try {
      const d = ethers.utils.hexlify(ethers.utils.toUtf8Bytes(finalContent));
      const t = {to:this.state.channel, value:0, data:d};
      t.gasLimit = await this.signer.estimateGas(t).then(g => g.mul(125).div(100));
      const tx = await this.signer.sendTransaction(t);
      const r = await tx.wait();
      const n = {content:finalContent, displayContent:userContent, parentTx:parentTx||null, reporter:this.state.signerAddress, timestamp:new Date().toISOString(), txHash:r.transactionHash, channel:this.state.channel};
      this.state.newsItems.unshift(n);
      await this.cache.saveItems([n]);
      this.renderNewsFeed();
      utils.showStatus("Story published: " + this.truncAddr(r.transactionHash));
    } catch(e) {utils.showStatus("Publish failed: " + e.message);} finally {utils.toggleLoading(false);}
  }

  async publishStory() {const c = this.elements.reportContent.value.trim(); if(!c) return utils.showStatus("Content cannot be empty"); await this.doPublish(c); this.elements.reportContent.value = ""; this.elements.publishStory.disabled = true;}

  openReplyModal = (postData) => {this.state.replyingTo = postData; const e = this.elements; e.replyHeader.textContent = "Reply"; e.replyingTo.innerHTML = `Replying to <strong>${this.truncAddr(postData.reporter)}</strong>`; e.replyContent.value = ""; e.replyCharCount.textContent = "0 / ∞"; e.replyModal.style.display = "flex"; e.replyContent.focus();};
  async postReplyFromModal() {const c = this.elements.replyContent.value.trim(); if(!c || !this.state.replyingTo) return; this.elements.replyModal.style.display = "none"; await this.doPublish(c, this.state.replyingTo.txHash); this.elements.replyContent.value = "";}

  openThread = (post) => {this.state.currentThreadPost = post; this.renderThread(); this.elements.threadModal.style.display = "flex";};
  renderThread = () => {const post = this.state.currentThreadPost; if(!post) return; this.elements.threadOriginal.innerHTML = `<div class="news-item" style="border:none;background:transparent;cursor:default">${this.getPostHTML(post, true)}</div>`; const replies = this.state.newsItems.filter(r => r.parentTx === post.txHash).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp)); let html = ""; replies.forEach(r => {html += `<div class="news-item" style="border:none;background:transparent;padding:15px 0">${this.getPostHTML(r, false)}</div>`;}); this.elements.threadReplies.innerHTML = replies.length ? html : `<p style="padding:20px;text-align:center;opacity:0.6">No replies yet in this thread. Be the first to reply above.</p>`;};
  async postThreadReply() {const c = this.elements.threadReplyContent.value.trim(); if(!c || !this.state.currentThreadPost) return; await this.doPublish(c, this.state.currentThreadPost.txHash); this.elements.threadReplyContent.value = ""; this.renderThread();}

  renderNewsFeed = () => {
    const n = this.state.newsItems.filter(x => this.state.searchTerm ? (x.displayContent || x.content || "").toLowerCase().includes(this.state.searchTerm) || x.reporter.toLowerCase().includes(this.state.searchTerm) : true);
    this.elements.newsFeed.innerHTML = n.length ? "" : "No news items available.";
    const f = document.createDocumentFragment();
    n.forEach(x => {
      const d = document.createElement("div");
      d.className = "news-item";
      d.innerHTML = this.getPostHTML(x, false);
      d.onclick = (e) => {if(!e.target.closest("a") && !e.target.closest("button")) this.openThread(x);};
      f.appendChild(d);
    });
    this.elements.newsFeed.appendChild(f);
    this.elements.refreshButton.disabled = this.state.isLoading;
    this.elements.refreshButton.textContent = this.state.isLoading ? "Loading..." : "Refresh";
  };

  debounce = (f, d) => {let t; return (...a) => {clearTimeout(t); t = setTimeout(() => f.apply(this, a), d);};};

  /* Fixed pagination for v1 API - keeps fetching pages until empty */
  async fetchOnePage(page = 1) {
    if (!this.state.hasMore || !this.state.channel) return [];
    let u = `https://api.scan.pulsechain.com/api?module=account&action=txlist&address=${this.state.channel}&limit=50&page=${page}`;
    try {
      const r = await fetch(u);
      if (!r.ok) throw new Error(`API error: ${r.status}`);
      const d = await r.json();
      const rawItems = d.status === "1" ? d.result : [];
      const i = this.parseTransactions(rawItems);
      this.state.hasMore = rawItems.length === 50; // if we got a full page, there might be more
      return i;
    } catch(e) {
      this.state.hasMore = false;
      utils.showStatus("Fetch failed: " + e.message);
      return [];
    }
  }

  async fetchPosts() {
    if (this.state.isLoading || !this.state.channel) return;
    this.state.isLoading = true;
    utils.toggleLoading(true);
    try {
      let added = false;
      let page = 1;
      while (!added && this.state.hasMore) {
        const p = await this.fetchOnePage(page);
        const u = p.filter(o => !this.state.newsItems.some(x => x.txHash === o.txHash));
        if (u.length) {
          this.state.newsItems = [...this.state.newsItems, ...u].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
          await this.cache.saveItems(u);
          added = true;
        }
        page++;
      }
      this.renderNewsFeed();
    } finally {
      this.state.isLoading = false;
      utils.toggleLoading(false);
      if (!this.state.hasMore) utils.showStatus("No more transactions found");
    }
  }

  parseTransactions = (t) => {
    return t.filter(x => x.input && x.input !== "0x" && x.to && x.to.toLowerCase() === this.state.channel).map(x => {
      try {
        let fullContent = ethers.utils.toUtf8String(x.input).trim();
        let parentTx = null;
        let displayContent = fullContent;
        const match = fullContent.match(/^REPLY_TO:(0x[a-f0-9]{64})\n\n/i);
        if (match) {
          parentTx = match[1].toLowerCase();
          displayContent = fullContent.substring(match[0].length).trim();
        }
        return displayContent.length ? {
          content: fullContent,
          displayContent: displayContent,
          parentTx: parentTx,
          reporter: x.from.toLowerCase(),
          timestamp: x.timeStamp ? new Date(x.timeStamp * 1000).toISOString() : new Date().toISOString(),
          txHash: x.hash,
          channel: this.state.channel
        } : null;
      } catch { return null; }
    }).filter(Boolean);
  };

  checkInfiniteScroll = () => {if(this.state.hasMore && !this.state.isLoading && window.innerHeight + window.scrollY >= document.body.offsetHeight) this.fetchPosts();}
  async refreshPosts() {this.state.nextPageParams = null; this.state.hasMore = true; await this.fetchPosts();}
  async pollNew() {if(!this.state.channel) return; const currentMax=this.state.newsItems[0]?.timestamp?new Date(this.state.newsItems[0].timestamp):new Date(0); const oldNext=this.state.nextPageParams; this.state.nextPageParams=null; const newItems=[]; while(this.state.hasMore){const page=await this.fetchOnePage(); const filtered=page.filter(i=>new Date(i.timestamp)>currentMax&&!this.state.newsItems.some(ex=>ex.txHash===i.txHash)&&!newItems.some(ex=>ex.txHash===i.txHash)); if(filtered.length)newItems.push(...filtered); if(filtered.length<50) break;} this.state.nextPageParams=oldNext; if(newItems.length){this.state.pendingNewItems=newItems.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)); this.elements.newStoriesButton.style.display="block";}}
  startPolling=()=>{this.pollInterval=setInterval(()=>this.pollNew(),120000)}
  stopPolling=()=>{clearInterval(this.pollInterval)}
  loadNewStories=()=>{this.state.newsItems=[...this.state.pendingNewItems,...this.state.newsItems];this.state.pendingNewItems=[];this.elements.newStoriesButton.style.display="none";this.renderNewsFeed();window.scrollTo({top:0,behavior:"smooth"})}

  async loadCachedData() {const i=await this.cache.getItems();this.state.newsItems=i.filter(x=>x.channel===this.state.channel).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));this.renderNewsFeed();}
  async loadProfile() {const p=await this.cache.getProfile(this.state.signerAddress)||{username:"",profilePicUrl:"image1.jpeg",bio:""};this.state.profile=p;this.elements.submissionAvatar.src=p.profilePicUrl;this.renderNewsFeed();}
}

const pulse = new PulseUnderground();
</script>
